 /*  Layout base  */
 .notif-page { max-width: 900px; margin: 0 auto; padding: 4px; }

 /*  Skeleton  */
 .skeleton-notif { background: white; border-radius: 18px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
 .skeleton-header { height: 60px; border-radius: 12px; margin-bottom: 16px; }
 .skeleton-product { height: 80px; border-radius: 12px; margin-bottom: 12px; }
 .skeleton-actions { height: 50px; border-radius: 12px; margin-top: 16px; }
 .shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
 @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

 .notif-section {
 margin-bottom: 20px;
 overflow: hidden;
 }

 .notif-section-header {
 display: flex;
 align-items: center;
 justify-content: space-between;
 padding: 18px 20px;
 background: linear-gradient(135deg, #3b1f5f, #5a3b8a);
 color: #fff;
 }
 .notif-section-header h2 { margin: 0; font-size: 16px; display: flex; align-items: center; gap: 8px; }
 .notif-section-header .section-count {
 background: rgba(255,255,255,.25);
 border-radius: 50px;
 padding: 2px 10px;
 font-size: 12px;
 font-weight: 700;
 }
 .notif-section-body { padding: 4px;  }


.notifications-filters {
background: white;
border-radius: 8px;
}
 /*  Solicitudes de compra  */
 .request-card {
 background: #f8f8fc;
 border-radius: 16px;
 padding: 16px;
 margin-bottom: 14px;
 border: 1px solid #eee;
 }
 .request-header {
 display: flex;
 justify-content: space-between;
 align-items: center;
 flex-wrap: wrap;
 gap: 10px;
 margin-bottom: 12px;
 }
 .request-header-left, .request-header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
 .request-summary { background: #fff; padding: 10px 12px; border-radius: 10px; margin-bottom: 12px; border: 1px solid #f0f0f5; }
 .summary-stats { display: flex; gap: 10px; flex-wrap: wrap; }
 .stat-badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
 .stat-badge.available { background: #e8f5e9; color: #2e7d32; }
 .stat-badge.unavailable { background: #ffebee; color: #c62828; }
 .stat-badge.total { background: #e8e8ff; color: #3b1f5f; }

 







 /*  Vendors / Pending rows  */
 .vendor-row, .pending-product-row {
 display: flex; align-items: center; gap: 12px;
 padding: 12px 14px; border-radius: 14px;
 background: #f5f5f8; margin-bottom: 10px; flex-wrap: wrap;
 }
 .vendor-row .info, .pending-product-row .info { flex: 1; min-width: 0; }
 .vendor-row .info strong, .pending-product-row .info strong { display: block; font-size: 14px; }
 .vendor-row .info span, .pending-product-row .info span { font-size: 12px; color: #888; }
 .vendor-row .actions, .pending-product-row .actions { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
 .pending-product-row img { width: 56px; height: 56px; object-fit: contain; border-radius: 10px; background: #fff; flex-shrink: 0; }
 .vest-pendiente { display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#fff8e1;color:#f57f17; }
 .vest-activo  { display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#e8f5e9;color:#2e7d32; }
 .vest-rechazado { display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#ffebee;color:#c62828; }
 .vest-suspendido{ display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#fff3e0;color:#e65100; }
 .btn-approve { padding:6px 14px;border:none;border-radius:20px;background:#e8f5e9;color:#2e7d32;font-size:12px;font-weight:600;cursor:pointer; }
 .btn-reject  { padding:6px 14px;border:none;border-radius:20px;background:#ffebee;color:#c62828;font-size:12px;font-weight:600;cursor:pointer; }
 .btn-suspend { padding:6px 14px;border:none;border-radius:20px;background:#fff3e0;color:#e65100;font-size:12px;font-weight:600;cursor:pointer; }
 .btn-stats  { padding:6px 14px;border:none;border-radius:20px;background:#e8e8ff;color:#3b1f5f;font-size:12px;font-weight:600;cursor:pointer; }

 /*  Reportes  */

 /*  Tabs de sección  */
 .notif-tabs { display:flex; gap:4px; padding:8px 10px; overflow-x:auto; border-bottom:1px solid #f0f0f5; background:#faf9ff; flex-wrap:nowrap; }
 .notif-tab { white-space:nowrap; padding:8px 10px; border-radius:10px; border:1.5px solid #e0e0e0; background:#fff; font-size:12px; font-weight:600; cursor:pointer; color:#555; transition:all .2s; }
 .notif-tab.active { background:#3b1f5f; color:#fff; border-color:#3b1f5f; }
 .notif-tab-badge { background:#ff4f81; color:#fff; border-radius:50px; padding:1px 5px; font-size:10px; font-weight:800; }

 /*  Pagination  */
 .notifications-pagination { display:flex;justify-content:center;gap:6px;padding:16px;flex-wrap:wrap; }
 .notifications-pagination button { padding:6px 12px;border:2px solid #e0e0e0;background:#fff;border-radius:8px;cursor:pointer;font-size:12px; }
 .notifications-pagination button:hover { background:#3b1f5f;color:#fff;border-color:#3b1f5f; }
 .notifications-pagination button.active-page { background:#3b1f5f;color:#fff;border-color:#3b1f5f; }

 /*  Confiable  */

 .btn-product-confiable:disabled { opacity:.5;cursor:not-allowed; }

 .lazy-notif { opacity:0; transition:opacity .3s; }
 .lazy-notif.loaded { opacity:1; }

 to  { opacity:1; transform:translateX(-50%) translateY(0); }

 <script>
 function switchNotifTab(section, btn) {
 // Ocultar todas las secciones
 ['solicitudes','vendors','pending','reportes'].forEach(s => {
 const el = document.getElementById('section-' + s);
 if (el) el.style.display = 'none';
 });
 // Mostrar la seleccionada
 const target = document.getElementById('section-' + section);
 if (target) target.style.display = 'block';
 // Actualizar tabs
 document.querySelectorAll('.notif-tab').forEach(t => t.classList.remove('active'));
 if (btn) btn.classList.add('active');
 // Disparar hash para que AdminComunidad cargue la sección correcta
 history.replaceState(null, '', '#' + section);
 }

 // Actualizar contador de tabs
 function updateTabBadge(section, count) {
 if (window._updateNotifTabBadge) { window._updateNotifTabBadge(section, count); return; }
 const el = document.getElementById('tab-badge-' + section);
 if (el) el.textContent = count;
 const sc = document.getElementById('sc-' + section);
 if (sc) sc.textContent = count;
 }

 // Recarga preservando scroll — llamar tras aprobar/rechazar/marcar revisado
 window.refreshNotifPageKeepScroll = function() {
 const scrollY = window.scrollY || document.documentElement.scrollTop;
 if (window.AdminComunidad) {
 AdminComunidad.loadVendors();
 AdminComunidad.loadPendingProducts();
 AdminComunidad.loadReportes();
 }
 if (window.NotifManager && typeof window.NotifManager.reload === 'function') {
 window.NotifManager.reload();
 } else if (typeof checkNotifications === 'function') {
 checkNotifications();
 }
 // Restaurar scroll después de que el DOM se actualice
 requestAnimationFrame(() => {
 setTimeout(() => { window.scrollTo({ top: scrollY, behavior: 'instant' }); }, 50);
 });
 };

 // Botón "recargar todo"
 document.getElementById('main-refresh-btn').addEventListener('click', () => {
 window.refreshNotifPageKeepScroll();
 });

 // Hash routing al cargar
 window.addEventListener('DOMContentLoaded', () => {
 const hash = window.location.hash.replace('#','');
 if (['vendors','pending','reportes'].includes(hash)) {
 const btn = document.querySelector(`.notif-tab[data-section="${hash}"]`);
 if (btn) switchNotifTab(hash, btn);
 }
 // Disparar conteo de solicitudes inmediatamente
 setTimeout(() => {
 if (typeof checkNotifications === 'function') checkNotifications();
 }, 600);

 // refreshAllAdminBadges en notificaciones.html = recarga datos sin perder scroll
 window.refreshAllAdminBadges = function() {
 window.refreshNotifPageKeepScroll && window.refreshNotifPageKeepScroll();
 };

 // MutationObserver: si checkNotifications (admin.js) pisa el badge del header
 // directamente con solo el conteo de solicitudes, lo corregimos con el total real
 const hbEl = document.getElementById('notif-badge-header');
 if (hbEl && window.MutationObserver) {
 let _guardActive = false;
 new MutationObserver(() => {
 if (_guardActive) return;
 const total = Object.values(window._notifSectionCounts || {}).reduce((a,b)=>a+b,0);
 const current = parseInt(hbEl.textContent) || 0;
 if (current !== total) {
 _guardActive = true;
 hbEl.textContent = total;
 hbEl.style.display = total > 0 ? 'inline' : 'none';
 _guardActive = false;
 }
 }).observe(hbEl, { childList: true, characterData: true, subtree: true });
 }
 });

 // Contadores internos de cada sección para sumar el badge del header
 window._notifSectionCounts = { solicitudes: 0, vendors: 0, pending: 0, reportes: 0 };

 // Función centralizada para redibujar el badge del header
 function _rebuildHeaderBadge() {
 const total = Object.values(window._notifSectionCounts).reduce((a, b) => a + b, 0);
 const hb = document.getElementById('notif-badge-header');
 if (hb) { hb.textContent = total; hb.style.display = total > 0 ? 'inline' : 'none'; }
 }

 window._updateNotifTabBadge = function(section, count) {
 const tabBadge = document.getElementById('tab-badge-' + section);
 if (tabBadge) {
 tabBadge.textContent = count;
 tabBadge.style.display = count > 0 ? 'inline-flex' : 'none';
 }
 const sc = document.getElementById('sc-' + section);
 if (sc) sc.textContent = count;
 // Guardar conteo de esta sección y actualizar el badge del header con la suma total
 if (window._notifSectionCounts.hasOwnProperty(section)) {
 window._notifSectionCounts[section] = count;
 }
 _rebuildHeaderBadge();
 // Re-aplicar el total después de un tick, por si checkNotifications lo pisa justo después
 setTimeout(_rebuildHeaderBadge, 50);
 };

 // Inicializar: ocultar badges con 0
 document.addEventListener('DOMContentLoaded', () => {
 ['solicitudes','vendors','pending','reportes'].forEach(s => {
 const tb = document.getElementById('tab-badge-' + s);
 if (tb && (tb.textContent === '0' || tb.textContent === '')) tb.style.display = 'none';
 });
 });

 // Observar cambios en conteos de AdminComunidad (manejado por _updateNotifTabBadge definido arriba)
 </script>
