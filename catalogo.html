  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(registration => console.log('✅ SW registrado:', registration.scope))
          .catch(error => console.log('❌ Error SW:', error));
      });
    }
  </script>
 
  <script defer>
let cartRendered = false;
 
// ===== INICIALIZAR VARIABLE GLOBAL =====
window.cartRendered = window.cartRendered || false;
 
// ===== DOM CONTENT LOADED =====
document.addEventListener('DOMContentLoaded', function () {
    console.log('🚀 Inicializando página con modales personalizados...');
 
    // Exponer funciones globales
    window.changePhoneNumber = changePhoneNumber;
    window.updateSavedPhoneDisplay = updateSavedPhoneDisplay;
    window.openCartDrawer = openCartDrawer;
    window.closeCartDrawer = closeCartDrawer;
    window.renderCart = renderCart;
    window.addToCart = addToCart;
 
    // Botón flotante del carrito
    const floatingCartBtn = document.getElementById('floating-cart-btn');
    if (floatingCartBtn) {
        const newBtn = floatingCartBtn.cloneNode(true);
        floatingCartBtn.parentNode.replaceChild(newBtn, floatingCartBtn);
        newBtn.addEventListener('click', () => {
            if (typeof window.openCartDrawer === 'function') {
                window.openCartDrawer();
            }
        });
    }
 
    // Actualizar badge de wishlist
    if (typeof updateWishlistBadge === 'function') updateWishlistBadge();
 
    // Botón cerrar carrito
    const closeCartBtn = document.getElementById('close-cart-btn');
    if (closeCartBtn) {
        const newBtn = closeCartBtn.cloneNode(true);
        closeCartBtn.parentNode.replaceChild(newBtn, closeCartBtn);
        newBtn.addEventListener('click', () => {
            console.log('❌ Cerrando carrito');
            if (typeof window.closeCartDrawer === 'function') {
                window.closeCartDrawer();
            }
        });
    }
 
    // Overlay (cierra carrito, wishlist e imagen modal)
    const overlay = document.getElementById('overlay');
    if (overlay) {
        const newOverlay = overlay.cloneNode(true);
        overlay.parentNode.replaceChild(newOverlay, overlay);
        newOverlay.addEventListener('click', () => {
            if (typeof window.closeCartDrawer === 'function') {
                window.closeCartDrawer();
            }
            if (typeof window.closeWishlistDrawer === 'function') {
                window.closeWishlistDrawer();
            }
            if (typeof closeImageModal === 'function') {
                closeImageModal();
            }
            newOverlay.classList.remove('visible');
        });
    }
 
    // Inicializar carrito (solo una vez)
    if (!window.cartRendered) {
        if (typeof loadCartFromStorage === 'function') loadCartFromStorage();
        if (typeof renderCart === 'function') renderCart();
        if (typeof updateSavedPhoneDisplay === 'function') updateSavedPhoneDisplay();
        window.cartRendered = true;
    }
 
    // ===== BOTTOM NAVIGATION (INICIALIZAR SOLO SI EXISTE) =====
    const bottomNav = document.querySelector('.bottom-nav');
    if (bottomNav) {
        initBottomNavigation();
    }
});
 
// ===== FUNCIÓN SEPARADA PARA LA BARRA INFERIOR =====
function initBottomNavigation() {
    // Actualizar contadores (badges)
    function updateBottomBadges() {
        const cartCount = document.getElementById('bottom-cart-count');
        const wishlistCount = document.getElementById('bottom-wishlist-count');
        
        if (cartCount) {
            const cart = JSON.parse(localStorage.getItem('cart') || '{}');
            const total = Object.values(cart).reduce((s, i) => s + (i.quantity || 0), 0);
            cartCount.textContent = total;
        }
        
        if (wishlistCount) {
            const wishlist = JSON.parse(localStorage.getItem('zr_wishlist') || '[]');
            wishlistCount.textContent = wishlist.length;
        }
    }
    
    // Navegación
    const navCatalogo = document.getElementById('nav-catalogo');
    const navOutfit = document.getElementById('nav-outfit');
    const navCart = document.getElementById('nav-cart');
    const navWishlist = document.getElementById('nav-wishlist');
    
    if (navCatalogo) {
        navCatalogo.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
    }
    
    if (navOutfit) {
        navOutfit.addEventListener('click', () => {
            window.location.href = 'outfit.html';
        });
    }
    
    if (navCart && typeof openCartDrawer === 'function') {
        navCart.addEventListener('click', (e) => {
            e.preventDefault();
            openCartDrawer();
        });
    }
    
    if (navWishlist && typeof openWishlistDrawer === 'function') {
        navWishlist.addEventListener('click', (e) => {
            e.preventDefault();
            openWishlistDrawer();
        });
    }
    
    window.addEventListener('cartUpdated', updateBottomBadges);
    window.addEventListener('wishlistUpdated', updateBottomBadges);
    
    updateBottomBadges();
    
const currentPage = window.location.pathname.includes('outfit.html') ? 'index.html' : null;
    document.querySelectorAll('.bottom-nav-item').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.page === currentPage) {
            btn.classList.add('active');
        }
    });
}
 
window.addEventListener('cartUpdated', function () {
    if (typeof renderCart === 'function') renderCart();
    if (typeof updateCartBadge === 'function') updateCartBadge();
});
 
const floatingWishlistBtn = document.getElementById('floating-wishlist-btn');
if (floatingWishlistBtn) {
    floatingWishlistBtn.addEventListener('click', () => {
        if (typeof window.openWishlistDrawer === 'function') {
            window.openWishlistDrawer();
        }
    });
}
 
const closeWishlistBtn = document.getElementById('close-wishlist-btn');
if (closeWishlistBtn) {
    closeWishlistBtn.addEventListener('click', () => {
        if (typeof window.closeWishlistDrawer === 'function') {
            window.closeWishlistDrawer();
        }
    });
}
 
const addAllWishlistBtn = document.getElementById('add-all-wishlist-to-cart');
if (addAllWishlistBtn) {
    addAllWishlistBtn.addEventListener('click', () => {
        if (typeof window.addAllWishlistToCart === 'function') {
            window.addAllWishlistToCart();
            if (typeof closeWishlistDrawer === 'function') closeWishlistDrawer();
        }
    });
}
 
window.addEventListener('wishlistUpdated', () => {
    const wishlist = getWishlist();
    wishlist.forEach(item => {
        if (typeof updateAllWishlistButtons === 'function') {
            updateAllWishlistButtons(item.id, true);
        }
    });
});
 
</script>
