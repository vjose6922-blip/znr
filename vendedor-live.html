<style>
  .live-wrap { max-width: 640px; margin: 0 auto; padding: 16px; padding-bottom: 100px; }

  .live-card {

  /* ── Layout fijo durante la transmisión: video+info arriba,

     100vh/100dvh miden más alto que lo realmente visible cuando

<script>
  // Alto real de la pantalla visible (evita el bug de 100vh/100dvh en
  // navegadores Android que no lo calculan bien con la barra de
  // direcciones/gestos presente). Se usa como var(--app-vh) en el CSS
  // de body.live-active.
  (function () {
    function setAppVh() {
      const h = (window.visualViewport && window.visualViewport.height)
        ? window.visualViewport.height
        : window.innerHeight;
      document.documentElement.style.setProperty('--app-vh', h + 'px');
    }
    setAppVh();
    window.addEventListener('resize', setAppVh);
    window.addEventListener('orientationchange', setAppVh);
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', setAppVh);
    }
  })();
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, push, onValue, query, limitToLast, update, get } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAaOe_lxLdQtTFCtw2BDR8KZRSafEMkkes",
  authDomain: "znr-live.firebaseapp.com",
  databaseURL: "https://znr-live-default-rtdb.firebaseio.com",
  projectId: "znr-live",
  storageBucket: "znr-live.firebasestorage.app",
  messagingSenderId: "1038143238323",
  appId: "1:1038143238323:web:5171b9dd8823628086c0c6"
};
const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const auth = getAuth(fbApp);

// ── Autenticación anónima + certificación de vendedor en RTDB ──
let authUid = null;
let authReadyResolve;
const authReady = new Promise((resolve) => { authReadyResolve = resolve; });
signInAnonymously(auth).catch(err => console.error('signInAnonymously falló:', err));
auth.onAuthStateChanged((user) => {
  if (user) {
    authUid = user.uid;
    authReadyResolve();
  }
});

// Certifica ante el backend que este uid anónimo es el dueño real de
// la liveId, para que las reglas de RTDB permitan isVendor:true / vendido:true.
// Se llama UNA vez por sesión live, justo antes de iniciar el chat.
const liveIdsCertificados = new Set();
async function certificarVendedorEnLive(liveId) {
  if (liveIdsCertificados.has(liveId)) return true;
  await authReady;
  try {
    const resp = await apiFetch({
      action: 'certificarVendedorLive',
      vendorToken: vendorSession.token,
      liveId,
      uid: authUid
    });
    if (resp.ok) {
      liveIdsCertificados.add(liveId);
      return true;
    }
    console.error('certificarVendedorLive falló:', resp.error);
    return false;
  } catch (err) {
    console.error('certificarVendedorLive error:', err);
    return false;
  }
}

// ── apiFetch mínimo, igual al de vendedor-unificado.js ──
async function apiFetch(data, method = 'POST') {
  const API_BASE = window.API_URL;
  const params = new URLSearchParams();
  Object.entries(data || {}).forEach(([k, v]) => {
    if (v !== undefined && v !== null) params.append(k, v);
  });
  let res;
  if (method === 'GET') {
    res = await fetch(`${API_BASE}?${params.toString()}`, { method: 'GET' });
  } else {
    res = await fetch(API_BASE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString()
    });
  }
  return JSON.parse(await res.text());
}

function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
  ]);
}

const wrap = document.getElementById('live-wrap');
const subtitle = document.getElementById('header-subtitle');
let vendorSession = null;
let currentSesion = null;
let selectedProductIds = new Set();
let allProducts = [];
let chatUnsub = null;
let presenceUnsub = null;
let lastViewers = [];
let tipoSeleccionado = 'grabado'; // 'grabado' es el default/recomendado
let orientacionSeleccionada = 'horizontal';

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

function getComprobadorUrl(id) {
  return `${location.origin}${location.pathname.replace('vendedor-live.html','comprador-live.html')}?id=${id}`;
}

// ── Espectadores (presencia en tiempo real, vía Firebase) ──
function setupContadorEspectadores(liveId) {
  const countEl = document.getElementById('viewer-count');
  presenceUnsub = onValue(ref(db, `presencia/${liveId}`), (snap) => {
    const data = snap.val() || {};
    lastViewers = Object.values(data).sort((a, b) => (b.ts || 0) - (a.ts || 0));
    if (countEl) countEl.textContent = lastViewers.length;
  }, (err) => console.error('setupContadorEspectadores falló (revisa las reglas de Firebase):', err));
}

function hace(ts) {
  if (!ts) return '';
  const seg = Math.max(0, Math.floor((Date.now() - ts) / 1000));
  if (seg < 60) return 'justo ahora';
  const min = Math.floor(seg / 60);
  if (min < 60) return `hace ${min} min`;
  const hr = Math.floor(min / 60);
  return `hace ${hr} h`;
}

function mostrarEspectadores() {
  const overlay = document.createElement('div');
  overlay.className = 'sheet-overlay';
  const filas = lastViewers.length
    ? lastViewers.map(v => `<div class="viewer-row"><span>👤 ${esc(v.nombre || 'Invitado')}</span><span class="hace">${esc(hace(v.ts))}</span></div>`).join('')
    : '<div class="chat-empty">Nadie te está viendo en este momento.</div>';
  overlay.innerHTML = `
    <div class="sheet-panel">
      <h2>👀 Te están viendo (${lastViewers.length})</h2>
      ${filas}
      <button class="cerrar" id="btn-cerrar-espectadores">Cerrar</button>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('btn-cerrar-espectadores').addEventListener('click', () => document.body.removeChild(overlay));
  overlay.addEventListener('click', (e) => { if (e.target === overlay) document.body.removeChild(overlay); });
}

// ── Reproductor sincronizado (video grabado que se comporta como en vivo) ──
// Todos los que ven la transmisión (compradores + tú aquí) quedan anclados
// al mismo segundo del video según el reloj real, no según cuándo cada quien
// le dio play. Así nadie ve "desde cero" un producto que ya se mostró/vendió.
let ytPlayer = null;
let ytSyncInterval = null;
let ytApiPromise = null;

function loadYouTubeAPI() {
  if (ytApiPromise) return ytApiPromise;
  ytApiPromise = new Promise((resolve) => {
    if (window.YT && window.YT.Player) { resolve(window.YT); return; }
    const prevCallback = window.onYouTubeIframeAPIReady;
    window.onYouTubeIframeAPIReady = () => {
      if (typeof prevCallback === 'function') prevCallback();
      resolve(window.YT);
    };
    if (!document.querySelector('script[src="https://www.youtube.com/iframe_api"]')) {
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    }
  });
  return ytApiPromise;
}

function resincronizarVideo(fechaInicioMs) {
  if (!ytPlayer || typeof ytPlayer.getDuration !== 'function') return;
  let duracion;
  try { duracion = ytPlayer.getDuration(); } catch (e) { return; }
  if (!duracion) return;
  let elapsed = (Date.now() - fechaInicioMs) / 1000;
  if (elapsed < 0) elapsed = 0;
  elapsed = elapsed % duracion; // si el video ya terminó, lo hace loop
  let actual = 0;
  try { actual = ytPlayer.getCurrentTime(); } catch (e) {}
  if (Math.abs(actual - elapsed) > 3) {
    try { ytPlayer.seekTo(elapsed, true); } catch (e) {}
  }
  try { ytPlayer.playVideo(); } catch (e) {}
}

async function iniciarPlayerSincronizado(containerId, youtubeId, fechaInicioMs) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const origin = encodeURIComponent(location.origin);
  container.innerHTML = `
    <iframe id="${containerId}-iframe"
      src="https://www.youtube-nocookie.com/embed/${esc(youtubeId)}?enablejsapi=1&autoplay=1&mute=1&controls=0&disablekb=1&modestbranding=1&rel=0&playsinline=1&iv_load_policy=3&origin=${origin}"
      allow="autoplay; encrypted-media" allowfullscreen title="Video de la transmisión"></iframe>
    <button class="sound-overlay" id="${containerId}-sound">🔊 Toca para activar el sonido</button>
  `;
  const YT = await loadYouTubeAPI();
  ytPlayer = new YT.Player(containerId + '-iframe', {
    events: {
      onReady: () => {
        resincronizarVideo(fechaInicioMs);
        if (ytSyncInterval) clearInterval(ytSyncInterval);
        ytSyncInterval = setInterval(() => resincronizarVideo(fechaInicioMs), 5000);
      },
      onStateChange: (e) => {
        if (e.data === YT.PlayerState.ENDED) resincronizarVideo(fechaInicioMs);
      }
    }
  });
  const soundBtn = document.getElementById(containerId + '-sound');
  if (soundBtn) {
    soundBtn.addEventListener('click', () => {
      if (ytPlayer && ytPlayer.unMute) {
        ytPlayer.unMute();
        ytPlayer.setVolume(100);
      }
      soundBtn.remove();
    });
  }
}

function detenerPlayerSincronizado() {
  if (ytSyncInterval) { clearInterval(ytSyncInterval); ytSyncInterval = null; }
  if (ytPlayer && typeof ytPlayer.destroy === 'function') {
    try { ytPlayer.destroy(); } catch (e) {}
  }
  ytPlayer = null;
}

async function loadProductGrid() {
  const grid = document.getElementById('product-grid');
  try {
    await fetchAllProducts();
    if (!allProducts.length) {
      grid.innerHTML = `<div class="chat-empty">Aún no tienes productos en tu catálogo de comunidad.</div>`;
      return;
    }
    grid.innerHTML = allProducts.map(p => `
      <div class="product-chip" data-id="${esc(p.id)}">
        <img src="${esc(p.imagen1 || 'https://placehold.co/200x200')}" alt="${esc(p.nombre)}" loading="lazy">
        <div class="chip-name">${esc(p.nombre)}</div>
      </div>
    `).join('');

    grid.querySelectorAll('.product-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const id = chip.dataset.id;
        if (selectedProductIds.has(id)) {
          selectedProductIds.delete(id);
          chip.classList.remove('selected');
        } else {
          selectedProductIds.add(id);
          chip.classList.add('selected');
        }
      });
    });
  } catch (err) {
    grid.innerHTML = `<div class="chat-empty">No se pudo cargar tu catálogo.</div>`;
  }
}

async function crearSesion() {
  const titulo = document.getElementById('f-titulo').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  const youtube = document.getElementById('f-youtube').value.trim();
  const btn = document.getElementById('btn-crear-sesion');
  const ytError = document.getElementById('f-youtube-error');
  const genError = document.getElementById('f-general-error');
  ytError.style.display = 'none';
  genError.style.display = 'none';

  if (!titulo) { genError.textContent = 'Ponle un título a tu transmisión.'; genError.style.display = 'block'; return; }
  if (!youtube) { ytError.textContent = 'Pega el link de tu video de YouTube.'; ytError.style.display = 'block'; return; }

  btn.disabled = true;
  btn.textContent = 'Creando…';

  try {
    const resp = await apiFetch({
      action: 'crearSesionLive',
      vendorToken: vendorSession.token,
      titulo, descripcion: desc,
      youtube_link: youtube,
      tipo: tipoSeleccionado,
      orientacion: orientacionSeleccionada,
      productos_ids: Array.from(selectedProductIds).join(';')
    });

    if (!resp.ok) {
      genError.textContent = resp.error || 'No se pudo crear la transmisión.';
      genError.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Crear transmisión';
      return;
    }

    await cargarSesionActual();
  } catch (err) {
    genError.textContent = 'Error de conexión. Intenta de nuevo.';
    genError.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Crear transmisión';
  }
}

// ── Cierre de transmisión: registra ventas, genera la página de
// entregas (100% local, sin backend) y guarda un historial liviano
// en este navegador para poder volver a abrirla después. ──
async function finalizarTransmision(finBtn) {
  if (finBtn) { finBtn.disabled = true; finBtn.textContent = 'Finalizando…'; }
  detenerPlayerSincronizado();

  let entregaUrl = null;

  try {
    const snap = await withTimeout(get(ref(db, `chats/${currentSesion.id}/messages`)), 5000);
    const data = snap.val() || {};
    const ventas = Object.values(data)
      .filter(m => m.vendido && !m.isVendor)
      .map(m => ({
        productId: m.producto_id || '',
        comprador_nombre: m.author || '',
        comprador_telefono: m.telefono || '',
        comprador_direccion: m.direccion || '',
        comprador_horario: m.horario || '',
        comprador_lat: (typeof m.lat === 'number') ? m.lat : null,
        comprador_lng: (typeof m.lng === 'number') ? m.lng : null
      }));

    if (ventas.length > 0) {
      const resp = await withTimeout(apiFetch({
        action: 'cerrarVentasLive',
        vendorToken: vendorSession.token,
        ventas: JSON.stringify(ventas)
      }), 8000);
      if (resp.ok) {
        alert(`✅ ${resp.added} venta(s) de ${resp.compradores} comprador(es) enviadas a tus notificaciones para confirmar.`);
      } else {
        alert('No se pudieron registrar las ventas: ' + (resp.error || 'error desconocido') + '. Puedes revisarlas manualmente en el chat.');
      }
      entregaUrl = await crearPaginaEntregas(ventas);
    }
  } catch (err) {
    console.error('finalizarTransmision: no se pudieron leer los "vendidos" (revisa las reglas de Firebase):', err);
    alert('No se pudieron leer los "vendidos" del chat (puede ser tu conexión). Se va a cerrar de todos modos — revísalos manualmente si hace falta.');
  }

  try {
    await withTimeout(apiFetch({ action: 'actualizarEstadoLive', vendorToken: vendorSession.token, id: currentSesion.id, estado: 'terminado' }), 8000);
  } catch (err) {
    // aunque no se confirme con el servidor, seguimos para no dejar al vendedor atorado
  }

  if (chatUnsub) chatUnsub();
  if (presenceUnsub) { presenceUnsub(); presenceUnsub = null; }
  renderEnded(entregaUrl);
}

// ── Arma el paquete de entrega (agrupado por comprador) y lo guarda
// en el backend (hoja Entregas_Live). El link que se comparte solo
// lleva el id del 00000
// y el estado ENTREGADO/PENDIENTE queda guardado, no solo local. ──
async function crearPaginaEntregas(ventas) {
  try {
    const grupos = {};
    ventas.forEach(v => {
      const key = v.comprador_telefono || ('sin_tel_' + v.comprador_nombre);
      if (!grupos[key]) {
        grupos[key] = {
          key: key,
          nombre: v.comprador_nombre || 'Comprador',
          telefono: v.comprador_telefono || '',
          direccion: v.comprador_direccion || '',
          horario: v.comprador_horario || '',
          lat: (typeof v.comprador_lat === 'number') ? v.comprador_lat : null,
          lng: (typeof v.comprador_lng === 'number') ? v.comprador_lng : null,
          items: [],
          total: 0
        };
      }
      const prod = allProducts.find(p => String(p.id) === String(v.productId));
      const precio = prod ? (Number(prod.precio) || 0) : 0;
      grupos[key].items.push({ nombre: (prod && prod.nombre) || 'Producto', precio });
      grupos[key].total += precio;
    });

    const gruposArr = Object.values(grupos);
    if (!gruposArr.length) return null;

    const resp = await withTimeout(apiFetch({
      action: 'guardarEntregasLive',
      vendorToken: vendorSession.token,
      liveId: currentSesion.id,
      liveTitulo: currentSesion.titulo || '',
      grupos: JSON.stringify(gruposArr)
    }), 8000);

    if (!resp.ok) {
      console.error('guardarEntregasLive falló:', resp.error);
      return null;
    }

    return `${location.origin}${location.pathname.replace('vendedor-live.html', 'entregas-live.html')}?id=${encodeURIComponent(currentSesion.id)}`;
  } catch (err) {
    console.error('crearPaginaEntregas falló:', err);
    return null;
  }
}

function renderEnded(entregaUrl) {
  detenerPlayerSincronizado();
  document.body.classList.remove('live-active');
  subtitle.textContent = 'Finalizada';
  wrap.innerHTML = `
    <div class="live-card center-text">
      <div class="upsell-icon">✅</div>
      <h2>Transmisión finalizada</h2>
      <p class="hint">¡Buen trabajo! Cuando quieras, puedes crear una nueva transmisión.</p>
      ${entregaUrl ? `
        <p class="hint" style="text-align:left;">📦 Ya puedes coordinar las entregas de esta transmisión. Comparte este link con tu repartidor si lo necesitas:</p>
        <div class="share-box">
          <input type="text" readonly value="${esc(entregaUrl)}" id="entrega-url">
          <button id="btn-copy-entrega">Copiar</button>
        </div>
        <button class="btn-live primary" id="btn-abrir-entregas">📦 Ver página de entregas</button>
        <div style="height:8px;"></div>
      ` : ''}
      <button class="btn-live ${entregaUrl ? 'ghost' : 'primary'}" id="btn-nueva">Crear nueva transmisión</button>
    </div>`;

  if (entregaUrl) {
    document.getElementById('btn-copy-entrega').addEventListener('click', () => {
      navigator.clipboard.writeText(entregaUrl).catch(() => {});
      const btn = document.getElementById('btn-copy-entrega');
      btn.textContent = '¡Copiado!';
      setTimeout(() => { btn.textContent = 'Copiar'; }, 1500);
    });
    document.getElementById('btn-abrir-entregas').addEventListener('click', () => {
      window.open(entregaUrl, '_blank');
    });
  }

  document.getElementById('btn-nueva').addEventListener('click', () => {
    currentSesion = null;
    selectedProductIds = new Set();
    renderCreateForm();
  });
}

function marcarVendido(liveId, key, msg) {
  if (msg.vendido) {
    if (confirm(`¿Quitar el marcado de vendido a "${msg.text}" de ${msg.author}?`)) {
      update(ref(db, `chats/${liveId}/messages/${key}`), { vendido: false });
    }
    return;
  }
  if (confirm(`¿Marcar "${msg.text}" de ${msg.author} (${msg.telefono || 'sin teléfono'}) como vendido?`)) {
    update(ref(db, `chats/${liveId}/messages/${key}`), { vendido: true });
  }
}

// ── Chat con Firebase Realtime Database ──
function setupChat(liveId, myName, isVendor) {
  const messagesEl = document.getElementById('chat-messages');
  const inputEl = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send');
  const chatRef = query(ref(db, `chats/${liveId}/messages`), limitToLast(100));

  chatUnsub = onValue(chatRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) { messagesEl.innerHTML = '<div class="chat-empty">Aún no hay mensajes.</div>'; return; }
    const entries = Object.entries(data).sort((a, b) => (a[1].ts || 0) - (b[1].ts || 0));
    messagesEl.innerHTML = entries.map(([key, m]) => {
      const prod = m.producto_id ? allProducts.find(p => String(p.id) === String(m.producto_id)) : null;
      const prodTag = prod ? `
        <div style="display:flex; align-items:center; gap:5px; margin-top:3px; opacity:.8;">
          <img src="${esc(prod.imagen1 || 'https://placehold.co/40x40')}" style="width:16px;height:16px;border-radius:4px;object-fit:cover;">
          <span style="font-size:10px; color:var(--color-text-soft);">${esc(prod.nombre)}</span>
        </div>` : '';
      return `
      <div class="chat-msg ${m.author === myName ? 'mine' : ''}" data-key="${esc(key)}" style="${!m.isVendor ? 'cursor:pointer;' : ''}">
        <span class="author">${esc(m.author)}${m.isVendor ? ' 🛍️' : ''}:</span>
        <span class="text">${esc(m.text)}</span>
        ${m.vendido ? '<span class="vendido-tag" style="display:inline-block;margin-left:6px;font-size:10px;font-weight:700;background:rgba(74,222,128,.15);color:#4ade80;padding:2px 7px;border-radius:999px;">✅ Vendido</span>' : ''}
        ${prodTag}
      </div>`;
    }).join('');
    messagesEl.scrollTop = messagesEl.scrollHeight;

    if (isVendor) {
      messagesEl.querySelectorAll('.chat-msg[data-key]').forEach(el => {
        const key = el.dataset.key;
        const msg = data[key];
        if (msg.isVendor) return;
        el.addEventListener('click', () => marcarVendido(liveId, key, msg));
      });
    }
  }, (err) => {
    console.error('setupChat onValue falló (revisa las reglas de Firebase):', err);
    messagesEl.innerHTML = `<div class="chat-empty">No se pudo cargar el chat: ${esc(err.message)}</div>`;
  });

  function send() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    push(ref(db, `chats/${liveId}/messages`), {
      author: myName, text, isVendor, ts: Date.now()
    }).catch(err => {
      console.error('send (chat vendedor) falló (revisa las reglas de Firebase):', err);
      alert('No se pudo enviar el mensaje: ' + err.message);
      inputEl.value = text;
    });
  }
  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
}

// ── Carga inicia45
async function cargarSesionActual() {
  wrap.innerHTML = '<div class="loading-spinner"></div>';
  try {
    const resp = await apiFetch({ action: 'obtenerMisSesionesLive', vendorToken: vendorSession.token }, 'GET');
    if (resp.ok && resp.sesiones && resp.sesiones.length) {
      const activa = resp.sesiones.find(s => s.estado === 'programado' || s.estado === 'en_vivo');
      if (activa) {
        currentSesion = activa;
        if (!allProducts.length) await fetchAllProducts();
        if (activa.estado === 'en_vivo') renderLive();
        else renderScheduled();
        return;
      }
    }
    renderCreateForm();
  } catch (err) {
    renderCreateForm();
  }
}

async function init() {
  const raw = localStorage.getItem('vendor_session');
  if (!raw) { renderNoSession(); return; }
  try { vendorSession = JSON.parse(raw); } catch (e) { renderNoSession(); return; }
  if (!vendorSession || !vendorSession.token) { renderNoSession(); return; }

  if (vendorSession.plan !== 'plus') { renderNoPlus(); return; }

  await cargarSesionActual();
}

init();
