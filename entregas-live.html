
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="
 default-src 'self';
 script-src 'self' 'unsafe-inline' https://www.gstatic.com;
 style-src 'self' 'unsafe-inline';
 img-src 'self' data: blob: https://lh3.googleusercontent.com https://drive.google.com https://placehold.co https://via.placeholder.com;
 connect-src 'self' https://script.google.com https://script.googleusercontent.com https://wttr.in https://www.gstatic.com https://firebaseinstallations.googleapis.com https://fcmregistrations.googleapis.com https://firebase.googleapis.com https://znr-live-default-rtdb.firebaseio.com https://nominatim.openstreetmap.org;
 font-src 'self';
 frame-src 'none';
 frame-ancestors 'none';
 object-src 'none';
 base-uri 'self';
 worker-src 'self' blob:;
 child-src 'self' blob:;
">
 <script src="error-bootstrap.js"></script>

<title>Entregas — Z&R</title>
<meta name="theme-color" content="#1e2128">
<link rel="preload" href="styles.css" as="style">
<link rel="stylesheet" href="styles.css">
<script src="api-config.js"></script>
<style>
  .entregas-wrap { max-width: 640px; margin: 0 auto; padding: 16px; padding-bottom: 80px; }

  .resumen-bar { display: flex; gap: 10px; margin-bottom: 16px; }
  .resumen-chip {
    flex: 1; text-align: center; padding: 10px 8px;
    border-radius: var(--radius-md); background: var(--color-surface);
    border: 1px solid var(--color-border-subtle);
  }
  .resumen-chip .num { font-size: 18px; font-weight: 800; color: var(--color-text-primary); display: block; }
  .resumen-chip .lbl { font-size: 11px; color: var(--color-text-soft); text-transform: uppercase; letter-spacing: .04em; }
  .resumen-chip.ok .num { color: #4ade80; }
  .resumen-chip.pend .num { color: #fbbf24; }

  .btn-refrescar {
    display: block; width: 100%; text-align: center; margin-bottom: 14px;
    background: var(--color-surface-2); color: var(--color-text-primary);
    border: 1px solid var(--color-border-subtle); border-radius: var(--radius-md);
    padding: 10px; font-size: 13px; font-weight: 600; cursor: pointer;
  }

  .entrega-card {
    background: var(--color-surface); border: 1px solid var(--color-border-subtle);
    border-radius: var(--radius-lg); padding: 16px; margin-bottom: 14px;
    transition: opacity .2s ease;
  }
  .entrega-card.is-entregado { opacity: .55; }

  .entrega-card .top-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .entrega-card h2 { margin: 0 0 2px; font-size: 16px; color: var(--color-text-primary); }
  .entrega-card .tel-link { font-size: 13px; color: var(--color-accent); text-decoration: none; }

  .estado-pill {
    font-size: 10px; font-weight: 700; letter-spacing: .03em;
    padding: 4px 10px; border-radius: var(--radius-pill); white-space: nowrap;
  }
  .estado-pill.pendiente { background: rgba(251,191,36,.15); color: #fbbf24; }
  .estado-pill.entregado { background: rgba(74,222,128,.15); color: #4ade80; }

  .entrega-detail { font-size: 13px; color: var(--color-text-soft); margin: 2px 0; line-height: 1.4; }
  .entrega-detail b { color: var(--color-text-primary); font-weight: 600; }

  .items-list { margin: 10px 0; padding: 10px 12px; background: var(--color-surface-2); border-radius: var(--radius-md); }
  .items-list .item-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--color-text-primary); padding: 3px 0; }
  .items-list .item-row span:last-child { color: var(--color-text-soft); }
  .total-row { display: flex; justify-content: space-between; font-size: 14px; font-weight: 700; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--color-border-subtle); color: var(--color-text-primary); }

  .btn-maps {
    display: block; text-align: center; text-decoration: none;
    background: var(--color-surface-2); color: var(--color-text-primary);
    border: 1px solid var(--color-border-subtle); border-radius: var(--radius-md);
    padding: 10px; font-size: 13px; font-weight: 600; margin: 10px 0;
  }
  .btn-maps:active { opacity: .8; }

  .estado-actions { display: flex; gap: 8px; margin-top: 10px; }
  .estado-actions button {
    flex: 1; border: none; border-radius: var(--radius-pill);
    padding: 11px; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .estado-actions button:disabled { opacity: .5; cursor: default; }
  .btn-entregado { background: rgba(74,222,128,.15); color: #4ade80; }
  .btn-entregado.active { background: #4ade80; color: #0a2e1a; }
  .btn-pendiente { background: rgba(251,191,36,.15); color: #fbbf24; }
  .btn-pendiente.active { background: #fbbf24; color: #3a2a04; }
  .btn-avisar { background: rgba(59,130,246,.15); color: #60a5fa; }
  .btn-avisar:disabled { opacity: .6; }

  .center-card { max-width: 480px; margin: 60px auto; padding: 0 20px; text-align: center; }
  .center-card .icon { font-size: 44px; margin-bottom: 12px; }
  .center-card h2 { color: var(--color-text-primary); margin: 0 0 8px; }
  .center-card p { color: var(--color-text-soft); font-size: 14px; line-height: 1.5; }

  .loading-spinner {
    width: 28px; height: 28px; border-radius: 50%;
    border: 3px solid var(--color-border-subtle); border-top-color: var(--color-accent-solid);
    animation: spin 0.8s linear infinite; margin: 60px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .local-note {
    font-size: 11px; color: var(--color-text-soft); text-align: center;
    margin: 18px 0 4px; line-height: 1.5;
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-left">
    <div class="header-text">
      <h1 class="app-title" id="header-title">Entregas</h1>
      <p class="app-subtitle" id="header-subtitle">Cargando…</p>
    </div>
  </div>
</header>

<main class="entregas-wrap" id="entregas-wrap"><div class="loading-spinner"></div></main>

<script>
(function() {
  'use strict';

  async function apiFetch(data, method = 'GET') {
    const API_BASE = window.API_URL;
    const params = new URLSearchParams();
    Object.entries(data || {}).forEach(([k, v]) => {
      if (v !== undefined && v !== null) params.append(k, v);
    });
    let res;
    if (method === 'GET') {
      res = await fetch(`${API_BASE}?${params.toString()}`, { method: 'GET' });
    } else {
      res = await fetch(API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: params.toString()
      });
    }
    return JSON.parse(await res.text());
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s == null ? '' : String(s);
    return d.innerHTML;
  }

  const wrap = document.getElementById('entregas-wrap');
  const headerTitle = document.getElementById('header-title');
  const headerSubtitle = document.getElementById('header-subtitle');
  const params = new URLSearchParams(location.search);
  const liveId = params.get('id');

  let entrega = null;

  function renderInvalido(msg) {
    headerSubtitle.textContent = 'Enlace inválido';
    wrap.innerHTML = `
      <div class="center-card">
        <div class="icon">🔗</div>
        <h2>No pudimos cargar esta entrega</h2>
        <p>${esc(msg || 'Pide al vendedor que te comparta el link de nuevo.')}</p>
      </div>`;
  }

  function mapsUrl(g) {
    if (typeof g.lat === 'number' && typeof g.lng === 'number') {
      return `https://www.google.com/maps?q=${g.lat},${g.lng}`;
    }
    if (g.direccion) {
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(g.direccion)}`;
    }
    return null;
  }

  function renderResumen() {
    const total = entrega.grupos.length;
    const entregados = entrega.grupos.filter(g => g.estado === 'entregado').length;
    return `
      <button class="btn-refrescar" id="btn-refrescar">🔄 Actualizar</button>
      <div class="resumen-bar">
        <div class="resumen-chip"><span class="num">${total}</span><span class="lbl">Total</span></div>
        <div class="resumen-chip ok"><span class="num">${entregados}</span><span class="lbl">Entregados</span></div>
        <div class="resumen-chip pend"><span class="num">${total - entregados}</span><span class="lbl">Pendientes</span></div>
      </div>`;
  }

  function renderGrupo(g) {
  const estado = g.estado === 'entregado' ? 'entregado' : 'pendiente';
  const url = mapsUrl(g);
  return `
    <div class="entrega-card ${estado === 'entregado' ? 'is-entregado' : ''}" data-key="${esc(g.compradorKey)}">
      <div class="top-row">
        <div>
          <h2>${esc(g.compradorNombre)}</h2>
          ${g.compradorTelefono ? `
            <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
              <a class="tel-link" href="tel:${g.compradorTelefono}">📞 ${esc(g.compradorTelefono)}</a>
              <a class="tel-link" href="https://wa.me/${encodeURIComponent(g.compradorTelefono.replace(/[\s()-]/g, ''))}" target="_blank" rel="noopener">💬 WhatsApp</a>
            </div>
          ` : ''}
        </div>
        <span class="estado-pill ${estado}">${estado === 'entregado' ? '✅ ENTREGADO' : '⏳ PENDIENTE'}</span>
      </div>
      ${g.compradorDireccion ? `<p class="entrega-detail"><b>Dirección:</b> ${esc(g.compradorDireccion)}</p>` : ''}
      ${g.compradorHorario ? `<p class="entrega-detail"><b>Horario:</b> ${esc(g.compradorHorario)}</p>` : ''}
      <div class="items-list">
        ${(g.items || []).map(it => `<div class="item-row"><span>${esc(it.nombre)}</span><span>$${Number(it.precio || 0).toLocaleString()}</span></div>`).join('')}
        <div class="total-row"><span>Total</span><span>$${Number(g.total || 0).toLocaleString()}</span></div>
      </div>
      ${url ? `<a class="btn-maps" href="${esc(url)}" target="_blank" rel="noopener">🗺️ Ver ubicación en Maps</a>` : ''}
      <div class="estado-actions">
        <button class="btn-entregado ${estado === 'entregado' ? 'active' : ''}" data-action="entregado">✅ Entregado</button>
        <button class="btn-pendiente ${estado === 'pendiente' ? 'active' : ''}" data-action="pendiente">⏳ Pendiente</button>
        <button class="btn-avisar" data-action="avisar">📍 Avisar llegada</button>
      </div>
    </div>`;
}

  function render() {
    headerTitle.textContent = entrega.liveTitulo ? `Entregas — ${entrega.liveTitulo}` : 'Entregas';
    headerSubtitle.textContent = entrega.vendedorNombre ? `De ${entrega.vendedorNombre}` : 'Coordinación de entregas';

    wrap.innerHTML = renderResumen() +
      entrega.grupos.map(g => renderGrupo(g)).join('') +
      `<p class="local-note">El estado se guarda en línea: lo que marques aquí lo va a ver el vendedor desde su panel.</p>`;

    document.getElementById('btn-refrescar').addEventListener('click', cargar);

    wrap.querySelectorAll('.entrega-card').forEach(card => {
      const key = card.dataset.key;
      card.querySelectorAll('.estado-actions button').forEach(btn => {
        if (btn.dataset.action === 'avisar') {
          btn.addEventListener('click', () => avisarLlegada(key, btn));
        } else {
          btn.addEventListener('click', () => toggleEstado(key, btn.dataset.action));
        }
      });
    });
  }

  async function avisarLlegada(key, btn) {
    const original = btn.textContent;
    btn.disabled = true;
    btn.textContent = '⏳ Enviando...';
    try {
      const resp = await apiFetch({
        action: 'notificarLlegadaEntrega',
        liveId,
        compradorKey: key
      }, 'POST');
      if (!resp.ok) throw new Error(resp.error || 'No se pudo enviar el aviso');
      if (resp.enviados > 0) {
        btn.textContent = '✅ Avisado';
      } else {
        btn.textContent = '⚠️ Sin notificaciones';
        alert('Este cliente no tiene notificaciones activadas. Contáctalo por WhatsApp o llamada.');
      }
    } catch (err) {
      btn.textContent = '❌ Error';
      alert('No se pudo avisar al cliente: ' + err.message);
    } finally {
      setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2500);
    }
  }

  async function toggleEstado(key, nuevoEstado) {
    const grupo = entrega.grupos.find(g => String(g.compradorKey) === String(key));
    if (!grupo || grupo.estado === nuevoEstado) return;

    const estadoAnterior = grupo.estado;
    grupo.estado = nuevoEstado; // optimista
    render();

    try {
      const resp = await apiFetch({
        action: 'actualizarEstadoEntrega',
        liveId,
        compradorKey: key,
        estado: nuevoEstado
      }, 'POST');
      if (!resp.ok) throw new Error(resp.error || 'No se pudo guardar');
    } catch (err) {
      grupo.estado = estadoAnterior; // revertir si falló
      render();
      alert('No se pudo guardar el cambio. Revisa tu conexión e intenta de nuevo.');
    }
  }

  async function cargar() {
    if (!liveId) { renderInvalido('Este link no trae identificador de transmisión.'); return; }
    wrap.innerHTML = '<div class="loading-spinner"></div>';
    try {
      const resp = await apiFetch({ action: 'obtenerEntregasLive', liveId });
      if (!resp.ok) { renderInvalido(resp.error); return; }
      entrega = resp;
      render();
    } catch (err) {
      renderInvalido('Hubo un problema de conexión.');
    }
  }

  cargar();
})();
</script>
</body>
</html>
