<style>
  .live-wrap { max-width: 640px; margin: 0 auto; padding: 0 0 40px; }

  /* El header es contenido normal: se va con el scroll. El video se
     "pega" arriba usando JS (position:fixed + un ancla que reserva su
     espacio), no CSS sticky — así funciona aunque algún estilo global
     de styles.css (p.ej. overflow-x:hidden en html/body) rompa el
     sticky nativo, que es justo lo que estaba pasando.
     IMPORTANTE: el video vive con position:absolute DENTRO del ancla
     (nunca contribuye al alto del ancla por flujo normal). El ancla
     tiene su propio alto (CSS de respaldo + congelado por JS), así
     que nunca se colapsa cuando el video pasa a fixed. */
  .video-anchor { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
  .video-anchor.vertical { height: 56vh; max-height: 520px; aspect-ratio: unset; }
  .video-box { position: absolute; inset: 0; width: 100%; height: 100%; background: #000; z-index: 20; }
  .video-box.stuck {
    position: fixed; top: 0; left: 0; right: 0; margin: 0 auto;
    max-width: 640px; z-index: 20;
  }
  .video-slot-inner { position: absolute; inset: 0; }
  .video-box iframe { width: 100%; height: 100%; border: 0; display: block; }
  .sound-overlay {
    position: absolute; inset: 0; z-index: 5; border: none; cursor: pointer;
    background: rgba(0,0,0,.4); color: #fff; font-size: 14px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; gap: 8px;

  .video-tap-blocker { position: absolute; inset: 0; z-index: 5; background: transparent; }

  .live-info { padding: 14px 16px; border-bottom: 1px solid var(--color-border-subtle); }
  .live-info h1 { margin: 0 0 4px; font-size: 16px; color: var(--color-text-primary); }
  .live-info .vendor { font-size: 13px; color: var(--color-text-soft); }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAaOe_lxLdQtTFCtw2BDR8KZRSafEMkkes",
  authDomain: "znr-live.firebaseapp.com",
  databaseURL: "https://znr-live-default-rtdb.firebaseio.com",
  projectId: "znr-live",
  storageBucket: "znr-live.firebasestorage.app",
  messagingSenderId: "1038143238323",
  appId: "1:1038143238323:web:5171b9dd8823628086c0c6"
};
const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const auth = getAuth(fbApp);

// ── Autenticación anónima: necesaria para que las reglas de RTDB
// puedan verificar auth != null y auth.uid en presencia/chats. ──
let authUid = null;
let authReadyResolve;
const authReady = new Promise((resolve) => { authReadyResolve = resolve; });
signInAnonymously(auth).catch(err => console.error('signInAnonymously falló:', err));
auth.onAuthStateChanged((user) => {
  if (user) {
    authUid = user.uid;
    authReadyResolve();
  }
});

async function apiFetch(data, method = 'GET') {
  const API_BASE = window.API_URL;
  const params = new URLSearchParams();
  Object.entries(data || {}).forEach(([k, v]) => {
    if (v !== undefined && v !== null) params.append(k, v);
  });
  const res = method === 'GET'
    ? await fetch(`${API_BASE}?${params.toString()}`, { method: 'GET' })
    : await fetch(API_BASE, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: params.toString() });
  return JSON.parse(await res.text());
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

const wrap = document.getElementById('live-wrap');
const params = new URLSearchParams(location.search);
const liveId = params.get('id');
let sesion = null;
let productosMap = {};
let identity = null;
let pollTimer = null;
let viewerId = null;
let presenceRef = null;
let presenceCountUnsub = null;
let stickyObserver = null;
let stickySentinel = null;
let stickyResizeHandler = null;

// ── Reproductor sincronizado (video grabado que se comporta como en vivo) ──
let ytPlayer = null;
let ytSyncInterval = null;
let ytMuteCheckInterval = null;
let ytApiPromise = null;

function loadYouTubeAPI() {
  if (ytApiPromise) return ytApiPromise;
  ytApiPromise = new Promise((resolve) => {
    if (window.YT && window.YT.Player) { resolve(window.YT); return; }
    const prevCallback = window.onYouTubeIframeAPIReady;
    window.onYouTubeIframeAPIReady = () => {
      if (typeof prevCallback === 'function') prevCallback();
      resolve(window.YT);
    };
    if (!document.querySelector('script[src="https://www.youtube.com/iframe_api"]')) {
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    }
  });
  return ytApiPromise;
}

function resincronizarVideo(fechaInicioMs) {
  if (!ytPlayer || typeof ytPlayer.getDuration !== 'function') return;
  let duracion;
  try { duracion = ytPlayer.getDuration(); } catch (e) { return; }
  if (!duracion) return;
  let elapsed = (Date.now() - fechaInicioMs) / 1000;
  if (elapsed < 0) elapsed = 0;
  elapsed = elapsed % duracion;
  let actual = 0;
  try { actual = ytPlayer.getCurrentTime(); } catch (e) {}
  if (Math.abs(actual - elapsed) > 3) {
    try { ytPlayer.seekTo(elapsed, true); } catch (e) {}
  }
  try { ytPlayer.playVideo(); } catch (e) {}
}

async function iniciarPlayerSincronizado(containerId, youtubeId, fechaInicioMs) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const origin = encodeURIComponent(location.origin);
  container.innerHTML = `
    <iframe id="${containerId}-iframe"
      src="https://www.youtube-nocookie.com/embed/${esc(youtubeId)}?enablejsapi=1&autoplay=1&mute=1&controls=0&disablekb=1&modestbranding=1&rel=0&playsinline=1&iv_load_policy=3&origin=${origin}"
      allow="autoplay; encrypted-media" allowfullscreen title="Transmisión en vivo"></iframe>
    <button class="sound-overlay" id="${containerId}-sound">🔊 Toca para activar el sonido</button>
  `;
  const YT = await loadYouTubeAPI();
  ytPlayer = new YT.Player(containerId + '-iframe', {
    events: {
      onReady: () => {
        resincronizarVideo(fechaInicioMs);
        if (ytSyncInterval) clearInterval(ytSyncInterval);
        ytSyncInterval = setInterval(() => resincronizarVideo(fechaInicioMs), 5000);
        if (ytMuteCheckInterval) clearInterval(ytMuteCheckInterval);
        ytMuteCheckInterval = setInterval(() => {
          if (ytPlayer && typeof ytPlayer.isMuted === 'function' && !ytPlayer.isMuted()) {
            bloquearInteraccionVideo(containerId);
          }
        }, 1000);
      },
      onStateChange: (e) => {
        if (e.data === YT.PlayerState.ENDED) resincronizarVideo(fechaInicioMs);
      }
    }
  });
  const soundBtn = document.getElementById(containerId + '-sound');
  if (soundBtn) {
    soundBtn.addEventListener('click', () => {
      if (ytPlayer && ytPlayer.unMute) {
        ytPlayer.unMute();
        ytPlayer.setVolume(100);
      }
      bloquearInteraccionVideo(containerId);
    });
  }
}

function bloquearInteraccionVideo(containerId) {
  if (ytMuteCheckInterval) { clearInterval(ytMuteCheckInterval); ytMuteCheckInterval = null; }
  const container = document.getElementById(containerId);
  if (!container) return;
  const soundBtn = document.getElementById(containerId + '-sound');
  if (soundBtn) soundBtn.remove();
  if (!document.getElementById(containerId + '-blocker')) {
    const blocker = document.createElement('div');
    blocker.id = containerId + '-blocker';
    blocker.className = 'video-tap-blocker';
    container.appendChild(blocker);
  }
}

function detenerStickyVideo() {
  if (stickyObserver) { stickyObserver.disconnect(); stickyObserver = null; }
  if (stickySentinel && stickySentinel.parentNode) { stickySentinel.parentNode.removeChild(stickySentinel); }
  stickySentinel = null;
  if (stickyResizeHandler) { window.removeEventListener('resize', stickyResizeHandler); stickyResizeHandler = null; }
}

// El video se "pega" arriba con JS en vez de confiar en CSS
// position:sticky. Si algún estilo global (por ejemplo
// overflow-x:hidden en html/body) rompe el sticky nativo, esto sigue
// funcionando: un sentinel de 0px justo antes del video se observa
// con IntersectionObserver; cuando sale del viewport por arriba, el
// video pasa a position:fixed (clase .stuck).
//
// CLAVE: el ancla (.video-anchor) congela su altura real por JS
// (medida antes de que el video se vuelva fixed) y se la pasa también
// al propio video. Así, cuando el video sale del flujo normal al
// volverse fixed, el ancla NUNCA se colapsa a 0 — sigue reservando
// exactamente el mismo espacio, así que nada salta ni se regresa.
function setupStickyVideo() {
  detenerStickyVideo();
  const anchor = document.getElementById('video-anchor');
  const videoBox = document.getElementById('video-box-el');
  if (!anchor || !videoBox) return;

  const congelarAltura = () => {
    if (videoBox.classList.contains('stuck')) return; // ya está fija, no recalcular a ciegas
    anchor.style.height = '';
    videoBox.style.height = '';
    const h = anchor.getBoundingClientRect().height;
    if (h > 0) {
      anchor.style.height = h + 'px';
      videoBox.style.height = h + 'px';
    }
  };

  requestAnimationFrame(congelarAltura);

  stickyResizeHandler = () => requestAnimationFrame(congelarAltura);
  window.addEventListener('resize', stickyResizeHandler);

  stickySentinel = document.createElement('div');
  stickySentinel.style.cssText = 'position:relative; height:0; width:100%;';
  anchor.parentNode.insertBefore(stickySentinel, anchor);

  stickyObserver = new IntersectionObserver(([entry]) => {
    videoBox.classList.toggle('stuck', !entry.isIntersecting);
  }, { threshold: [0] });
  stickyObserver.observe(stickySentinel);
}

function detenerPlayerSincronizado() {
  if (ytSyncInterval) { clearInterval(ytSyncInterval); ytSyncInterval = null; }
  if (ytMuteCheckInterval) { clearInterval(ytMuteCheckInterval); ytMuteCheckInterval = null; }
  if (ytPlayer && typeof ytPlayer.destroy === 'function') {
    try { ytPlayer.destroy(); } catch (e) {}
  }
  ytPlayer = null;
}

// ── Presencia (contador de espectadores en vivo) ──
// El viewerId AHORA es el uid de Firebase Auth (anónimo), porque las
// reglas de RTDB exigen que auth.uid === $viewerId. Ya no se genera
// un id aleatorio propio: se usa el que asigna Firebase.
function getViewerId() {
  return authUid;
}

function registrarPresencia() {
  if (!liveId) return;
  viewerId = getViewerId();
  presenceRef = ref(db, `presencia/${liveId}/${viewerId}`);
  const nombre = (identity && identity.nombre) ? identity.nombre : 'Invitado';
  set(presenceRef, { nombre, ts: Date.now() }).catch(err => console.error('registrarPresencia falló (revisa las reglas de Firebase):', err));
  onDisconnect(presenceRef).remove().catch(() => {});
}

function actualizarPresenciaNombre() {
  if (!presenceRef) return;
  const nombre = (identity && identity.nombre) ? identity.nombre : 'Invitado';
  set(presenceRef, { nombre, ts: Date.now() }).catch(err => console.error('actualizarPresenciaNombre falló:', err));
}

function quitarPresencia() {
  if (presenceCountUnsub) { presenceCountUnsub(); presenceCountUnsub = null; }
  if (presenceRef) { remove(presenceRef).catch(() => {}); presenceRef = null; }
}

function setupContadorEspectadores() {
  if (!liveId) return;
  const countEl = document.getElementById('viewer-count');
  presenceCountUnsub = onValue(ref(db, `presencia/${liveId}`), (snap) => {
    const data = snap.val() || {};
    if (countEl) countEl.textContent = Object.keys(data).length;
  }, (err) => console.error('setupContadorEspectadores falló (revisa las reglas de Firebase):', err));
}

// ── Reportar transmisión ──
function mostrarReporte() {
  const overlay = document.createElement('div');
  overlay.className = 'identity-overlay';
  overlay.innerHTML = `
    <div class="identity-sheet">
      <h2>🚩 Reportar esta transmisión</h2>
      <p>Cuéntanos qué está pasando. Un administrador va a revisarlo. Esto no cancela nada que hayas apartado ni te saca del chat.</p>
      <label for="rep-motivo">¿Qué está pasando?</label>
      <textarea id="rep-motivo" maxlength="300" placeholder="Ej. contenido inapropiado, producto engañoso, lenguaje ofensivo…"></textarea>
      <button id="rep-btn">Enviar reporte</button>
      <button type="button" id="rep-cancel" style="background:var(--color-surface-2); color:var(--color-text-primary); border:1px solid var(--color-border-subtle); margin-top:8px;">Cancelar</button>
    </div>`;
  document.body.appendChild(overlay);

  document.getElementById('rep-cancel').addEventListener('click', () => document.body.removeChild(overlay));

  document.getElementById('rep-btn').addEventListener('click', async () => {
    const motivo = document.getElementById('rep-motivo').value.trim();
    if (!motivo) { alert('Cuéntanos brevemente qué está pasando.'); return; }
    const btn = document.getElementById('rep-btn');
    btn.disabled = true;
    btn.textContent = 'Enviando…';
    try {
      const resp = await apiFetch({
        action: 'reportarSesionLive',
        liveId: liveId,
        liveTitulo: sesion.titulo || '',
        vendedor_uid: sesion.vendedor_id || '',
        vendedor_nombre: sesion.vendedor_nombre || '',
        youtubeLink: sesion.youtube_id ? `https://www.youtube.com/watch?v=${sesion.youtube_id}` : '',
        motivo,
        telefonoUsuario: identity ? (identity.telefono || '') : ''
      }, 'POST');
      if (resp.ok) {
        alert('Gracias, tu reporte fue enviado.');
        document.body.removeChild(overlay);
      } else {
        alert('No se pudo enviar el reporte: ' + (resp.error || 'error desconocido'));
        btn.disabled = false;
        btn.textContent = 'Enviar reporte';
      }
    } catch (err) {
      alert('Error de conexión al enviar el reporte.');
      btn.disabled = false;
      btn.textContent = 'Enviar reporte';
    }
  });
}

function renderNoId() {
  document.body.classList.remove('live-active');
  wrap.innerHTML = `
    <div class="center-card">
      <div class="icon">🔗</div>
      <h2>Link inválido</h2>
      <p>Este link de transmisión no es válido. Pide al vendedor que te comparta el link de nuevo.</p>
    </div>`;
}

function renderNotFound() {
  document.body.classList.remove('live-active');
  wrap.innerHTML = `
    <div class="center-card">
      <div class="icon">😕</div>
      <h2>Transmisión no encontrada</h2>
      <p>Puede que haya terminado o el link esté incompleto.</p>
    </div>`;
}

function renderEnded() {
  detenerPlayerSincronizado();
  detenerStickyVideo();
  quitarPresencia();
  document.body.classList.remove('live-active');
  wrap.innerHTML = `
    <div class="center-card">
      <div class="icon">✅</div>
      <h2>Esta transmisión ya terminó</h2>
      <p>Gracias por acompañar a ${esc(sesion.vendedor_nombre)}. Si apartaste algo, el vendedor se pondrá en contacto contigo.</p>
    </div>`;
}

function renderScheduledWait() {
  document.body.classList.remove('live-active');
  wrap.innerHTML = `
    <div class="center-card">
      <div class="icon">⏳</div>
      <h2>${esc(sesion.titulo)}</h2>
      <p>${esc(sesion.vendedor_nombre)} todavía no inicia su transmisión. Vuelve a entrar en unos minutos.</p>
    </div>`;
}

// ── Identidad del comprador (nombre + teléfono, se guarda local) ──
function getIdentity() {
  try {
    const raw = localStorage.getItem('znr_chat_identity');
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}

function askIdentity(onDone) {
  const prev = identity || {};
  let gpsCoords = (typeof prev.lat === 'number' && typeof prev.lng === 'number')
    ? { lat: prev.lat, lng: prev.lng } : null;

  const overlay = document.createElement('div');
  overlay.className = 'identity-overlay';
  overlay.innerHTML = `
    <div class="identity-sheet">
      <h2>Únete al chat</h2>
      <p>Para comentar y apartar productos, dinos quién eres y dónde entregarte. El vendedor usará esto para contactarte y coordinar la entrega.</p>
      <label for="idn-nombre">Tu nombre</label>
      <input type="text" id="idn-nombre" placeholder="Nombre y apellido" maxlength="40" value="${esc(prev.nombre || '')}">
      <label for="idn-tel">Tu teléfono</label>
      <input type="tel" id="idn-tel" placeholder="10 dígitos" maxlength="10" value="${esc(prev.telefono || '')}">
      <label for="idn-dir">Dirección de entrega</label>
      <textarea id="idn-dir" placeholder="Calle, número, colonia, referencias… (o usa tu ubicación abajo)" maxlength="200">${esc(prev.direccion || '')}</textarea>
      <button type="button" class="btn-gps" id="idn-gps-btn">📍 Usar mi ubicación actual</button>
      <p class="gps-status ${gpsCoords ? 'ok' : ''}" id="idn-gps-status">${gpsCoords ? '✅ Ya tenemos tu ubicación guardada.' : ''}</p>
      <label for="idn-horario">Horario para entrega</label>
      <input type="text" id="idn-horario" placeholder="Ej. Tardes después de 5pm, fines de semana…" maxlength="80" value="${esc(prev.horario || '')}">
      <button id="idn-btn">Entrar al chat</button>
    </div>`;
  document.body.appendChild(overlay);

  document.getElementById('idn-gps-btn').addEventListener('click', () => {
    const statusEl = document.getElementById('idn-gps-status');
    if (!navigator.geolocation) {
      statusEl.className = 'gps-status error';
      statusEl.textContent = 'Tu navegador no soporta ubicación por GPS. Escribe tu dirección arriba.';
      return;
    }
    statusEl.className = 'gps-status';
    statusEl.textContent = 'Obteniendo tu ubicación…';
    navigator.geolocation.getCurrentPosition((pos) => {
      gpsCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      statusEl.className = 'gps-status ok';
      statusEl.textContent = '✅ Ubicación capturada. El vendedor podrá verla en el mapa.';
    }, (err) => {
      gpsCoords = null;
      statusEl.className = 'gps-status error';
      statusEl.textContent = 'No se pudo obtener tu ubicación (revisa los permisos). Escribe tu dirección arriba.';
    }, { enableHighAccuracy: true, timeout: 10000 });
  });

  document.getElementById('idn-btn').addEventListener('click', () => {
    const nombre = document.getElementById('idn-nombre').value.trim();
    const tel = document.getElementById('idn-tel').value.replace(/\D/g, '');
    const direccion = document.getElementById('idn-dir').value.trim();
    const horario = document.getElementById('idn-horario').value.trim();
    if (!nombre || tel.length !== 10) {
      alert('Escribe tu nombre y un teléfono válido de 10 dígitos.');
      return;
    }
    if (!direccion && !gpsCoords) {
      alert('Escribe tu dirección o usa el botón para compartir tu ubicación.');
      return;
    }
    if (!horario) {
      alert('Dinos en qué horario podemos entregarte.');
      return;
    }
    identity = {
      nombre, telefono: tel, direccion, horario,
      lat: gpsCoords ? gpsCoords.lat : null,
      lng: gpsCoords ? gpsCoords.lng : null
    };
    localStorage.setItem('znr_chat_identity', JSON.stringify(identity));
    actualizarPresenciaNombre();
    document.body.removeChild(overlay);
    onDone();
  });
}

function renderLive() {
  document.body.classList.add('live-active');
  const esGrabado = sesion.tipo !== 'vivo';
  const esVertical = sesion.orientacion === 'vertical';

  const chatMarkup = `
    <div class="chat-messages" id="chat-messages"><div class="chat-empty">Sé el primero en comentar 👋</div></div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="Escribe un comentario…" maxlength="300">
      <button id="chat-send">➤</button>
    </div>`;

  const videoMarkup = `
    <div class="video-slot-inner" id="video-slot">
      ${esGrabado ? '' : `<iframe src="https://www.youtube-nocookie.com/embed/${esc(sesion.youtube_id)}?autoplay=1"
        allow="autoplay; encrypted-media" allowfullscreen title="Transmisión en vivo"></iframe>`}
    </div>`;

  if (esVertical) {
    // Estilo YouTube: el video se queda fijo arriba; todo lo demás
    // (título, producto, chat) es contenido normal que se desplaza
    // por debajo. Nada se sobrepone al video.
    wrap.innerHTML = `
      <div class="video-anchor vertical" id="video-anchor">
        <div class="video-box" id="video-box-el">${videoMarkup}</div>
      </div>
      <div class="live-info-compact">
        <span class="status-dot"></span>
        <strong>${esc(sesion.titulo)}</strong>
        <span class="viewer-badge">👀 <span id="viewer-count">0</span></span>
      </div>
      <div id="producto-slot"></div>
      <div class="chat-section">
        <div class="chat-panel">${chatMarkup}</div>
      </div>
    `;
  } else {
    wrap.innerHTML = `
      <div class="video-anchor" id="video-anchor">
        <div class="video-box" id="video-box-el">${videoMarkup}</div>
      </div>
      <div class="live-info">
        <span class="status-badge live"><span class="status-dot"></span> EN VIVO</span>
        <span class="viewer-badge">👀 <span id="viewer-count">0</span></span>
        <h1>${esc(sesion.titulo)}</h1>
        <p class="vendor">Por ${esc(sesion.vendedor_nombre)}</p>
      </div>
      <div id="producto-slot"></div>
      <div class="chat-section">
        <div class="chat-panel">${chatMarkup}</div>
      </div>
    `;
  }

  setupStickyVideo();
  renderProductoActual();
  setupChat();
  registrarPresencia();
  setupContadorEspectadores();

  document.getElementById('chat-send').addEventListener('click', enviarMensaje);
  document.getElementById('chat-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') enviarMensaje(); });

  if (esGrabado && sesion.youtube_id && sesion.fecha_inicio) {
    const fechaInicioMs = new Date(sesion.fecha_inicio).getTime();
    if (!isNaN(fechaInicioMs)) {
      iniciarPlayerSincronizado('video-slot', sesion.youtube_id, fechaInicioMs);
    }
  }
}

function renderProductoActual() {
  const slot = document.getElementById('producto-slot');
  if (!slot) return;
  const p = productosMap[sesion.producto_actual_id];
  if (!p) { slot.innerHTML = ''; return; }
  const palabra = (p.nombre || '').trim().split(/\s+/)[0].toUpperCase();
  slot.innerHTML = `
    <div class="producto-actual">
      <img src="${esc(p.imagen1 || 'https://placehold.co/100x100')}" alt="${esc(p.nombre)}">
      <div class="info">
        <p class="nombre">${esc(p.nombre)}</p>
        <p class="precio">$${Number(p.precio || 0).toLocaleString()}</p>
      </div>
      <button class="btn-apartar" id="btn-apartar">🙋 Comentar "${esc(palabra)}"</button>
    </div>`;
  document.getElementById('btn-apartar').addEventListener('click', (e) => {
    const btn = e.currentTarget;
    if (!identity) { askIdentity(() => enviarMensaje(palabra)); return; }
    enviarMensaje(palabra);
    const textoOriginal = btn.textContent;
    btn.textContent = '✅ Enviado';
    btn.disabled = true;
    setTimeout(() => { btn.textContent = textoOriginal; btn.disabled = false; }, 1200);
  });
}

function enviarMensaje(textoDirecto) {
  const input = document.getElementById('chat-input');
  const text = textoDirecto != null ? textoDirecto.trim() : input.value.trim();
  if (!text || !identity) return;
  if (textoDirecto == null) input.value = '';
  const payload = {
    author: identity.nombre,
    telefono: identity.telefono,
    direccion: identity.direccion || '',
    horario: identity.horario || '',
    text, isVendor: false, ts: Date.now(),
    producto_id: String(sesion.producto_actual_id || '')
  };
  if (typeof identity.lat === 'number' && typeof identity.lng === 'number') {
    payload.lat = identity.lat;
    payload.lng = identity.lng;
  }
  push(ref(db, `chats/${liveId}/messages`), payload).catch(err => {
    alert('No se pudo enviar tu comentario: ' + err.message);
    if (textoDirecto == null) input.value = text;
  });
}

function setupChat() {
  const messagesEl = document.getElementById('chat-messages');
  onValue(ref(db, `chats/${liveId}/messages`), (snapshot) => {
    const data = snapshot.val();
    if (!data) { messagesEl.innerHTML = '<div class="chat-empty">Sé el primero en comentar 👋</div>'; return; }
    const msgs = Object.values(data).sort((a, b) => (a.ts || 0) - (b.ts || 0)).slice(-100);
    messagesEl.innerHTML = msgs.map(m => `
      <div class="chat-msg ${identity && m.author === identity.nombre ? 'mine' : ''}">
        <span class="author">${esc(m.author)}${m.isVendor ? ' 🛍️' : ''}:</span>
        <span class="text">${esc(m.text)}</span>
        ${m.vendido ? '<span class="vendido-tag">✅ Vendido</span>' : ''}
      </div>
    `).join('');
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }, (err) => {
    messagesEl.innerHTML = `<div class="chat-empty">No se pudo cargar el chat: ${esc(err.message)}</div>`;
  });
}

// ── Polling ligero para detectar cambios de estado / producto actual ──
function startPolling() {
  pollTimer = setInterval(async () => {
    try {
      const resp = await apiFetch({ action: 'obtenerSesionLivePorId', id: liveId });
      if (!resp.ok) return;
      const nueva = resp.sesion;
      if (nueva.estado === 'terminado') {
        clearInterval(pollTimer);
        sesion = nueva;
        renderEnded();
        return;
      }
      if (nueva.producto_actual_id !== sesion.producto_actual_id) {
        sesion.producto_actual_id = nueva.producto_actual_id;
        renderProductoActual();
      }
    } catch (e) { /* silencioso, reintenta en el siguiente ciclo */ }
  }, 6000);
}

async function init() {
  if (!liveId) { renderNoId(); return; }

  identity = getIdentity();
  await authReady; // esperar a que Firebase asigne el uid anónimo antes de leer/escribir RTDB

  try {
    const resp = await apiFetch({ action: 'obtenerSesionLivePorId', id: liveId });
    if (!resp.ok) { renderNotFound(); return; }
    sesion = resp.sesion;

    const btnReportar = document.getElementById('btn-reportar');
    btnReportar.style.display = 'flex';
    btnReportar.addEventListener('click', mostrarReporte);

    const prodResp = await apiFetch({ action: 'listarComunidad', vendedor_uid: sesion.vendedor_id, limit: 50 });
    if (prodResp.ok && prodResp.products) {
      prodResp.products.forEach(p => { productosMap[p.id] = p; });
    }

    if (sesion.estado === 'terminado') { renderEnded(); return; }
    if (sesion.estado === 'programado') { renderScheduledWait(); return; }

    renderLive();
    startPolling();

    if (!identity || (!identity.direccion && !(typeof identity.lat === 'number' && typeof identity.lng === 'number')) || !identity.horario) {
      askIdentity(() => {});
    }
  } catch (err) {
    renderNotFound();
  }
}

init();
</script>
