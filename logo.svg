<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4f81"/>
      <stop offset="60%" stop-color="#ff6a60"/>
      <stop offset="100%" stop-color="#ff9f6e"/>
    </linearGradient>
    <linearGradient id="shineG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#c0305a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Gradient background -->
  <rect width="200" height="200" rx="46" fill="url(#bgG)" filter="url(#shadow)"/>

  <!-- Inner shine -->
  <rect width="200" height="100" rx="46" fill="url(#shineG)"/>
  <rect y="100" width="200" height="100" rx="0" fill="none"/>

  <!-- Z letter -->
  <text
    x="20" y="128"
    font-size="88"
    fill="white"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    opacity="0.97">Z</text>

  <!-- & ampersand — smaller, offset -->
  <text
    x="82" y="118"
    font-size="38"
    fill="rgba(255,255,255,0.82)"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900">&amp;</text>

  <!-- R letter -->
  <text
    x="112" y="128"
    font-size="88"
    fill="white"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    opacity="0.97">R</text>

  <!-- Moda tagline -->
  <text
    x="100" y="155"
    font-size="12"
    text-anchor="middle"
    fill="rgba(255,255,255,0.70)"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-weight="500"
    letter-spacing="6">Community</text>
</svg>
