<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4f81"/>
      <stop offset="100%" stop-color="#ff7a4f"/>
    </linearGradient>

    <!-- Gradiente del fondo: profundidad morada -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1245"/>
      <stop offset="100%" stop-color="#3b1f5f"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="ringGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <clipPath id="roundedClip">
      <rect width="200" height="200" rx="44"/>
    </clipPath>
  </defs>

  <rect width="200" height="200" rx="44" fill="url(#bgGrad)"/>

  <g clip-path="url(#roundedClip)" opacity="0.18">
    <circle cx="30"  cy="30"  r="1.2" fill="#c084fc"/>
    <circle cx="80"  cy="20"  r="1"   fill="#c084fc"/>
    <circle cx="140" cy="35"  r="1.2" fill="#c084fc"/>
    <circle cx="175" cy="15"  r="0.9" fill="#c084fc"/>
    <circle cx="20"  cy="90"  r="1"   fill="#c084fc"/>
    <circle cx="55"  cy="165" r="1.2" fill="#c084fc"/>
    <circle cx="110" cy="180" r="1"   fill="#c084fc"/>
    <circle cx="170" cy="155" r="1.2" fill="#c084fc"/>
    <circle cx="185" cy="80"  r="0.9" fill="#c084fc"/>
    <circle cx="160" cy="110" r="1"   fill="#c084fc"/>
    <circle cx="40"  cy="130" r="1.2" fill="#c084fc"/>
  </g>

  <circle cx="100" cy="100" r="90"
          fill="none"
          stroke="url(#grad)"
          stroke-width="1.2"
          stroke-dasharray="6 5"
          opacity="0.28"
          filter="url(#ringGlow)"/>

  <rect x="62" y="138" width="76" height="3" rx="1.5"
        fill="url(#grad)" opacity="0.7"/>

  <text
    x="100" y="126"
    font-size="80"
    text-anchor="middle"
    fill="url(#grad)"
    font-family="'Trebuchet MS', 'Arial Black', Arial, sans-serif"
    font-weight="900"
    letter-spacing="2"
    filter="url(#glow)">Z&amp;R</text>

  <text
    x="100" y="155"
    font-size="11"
    text-anchor="middle"
    fill="#e9d5ff"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-weight="400"
    letter-spacing="5"
    opacity="0.65">Movil</text>
</svg>