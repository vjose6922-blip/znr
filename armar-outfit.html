  html, body { overscroll-behavior-x: none; }

  .ob-main { padding: 2px 0 180px; }

  .ob-chip.active { background: var(--color-accent-solid); border-color: var(--color-accent-solid); color:#fff; }

  const map = {

//  PALABRAS CLAVE PARA GÉNERO (FALLBACK)
// ============================================================
const GENERO_KEYWORDS = {
  mujer: ['mujer', 'dama', 'femenino', 'women', 'woman', 'girl', 'nina', 'femme'],
  hombre: ['hombre', 'caballero', 'masculino', 'men', 'man', 'varonil', 'boy', 'nino']
};

// ============================================================
//  PALABRAS CLAVE PARA ESTILO Y VESTIDOS
// ============================================================
const ESTILO_FORMAL_KEYWORD = 'vestir';
const PIES_FORMAL_KEYWORDS = ['zapato', 'tacones'];
const VESTIDO_KEYWORDS = ['vestido', 'vestidos', 'dress'];

// ============================================================
//  AUXILIARES DE TEXTO
// ============================================================
function _obNorm(s) {
  return (s || '').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}
function _obHay(p) {
  return [p.Nombre, p.Categoria, p.Descripcion].map(x => (x || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')).join(' ');
}

// ============================================================
//  DETECCIÓN DE SECCIÓN POR CATEGORÍA
// ============================================================
function detectSectionByCategory(p) {
  const cat = (p.Categoria || '').toLowerCase().trim();
  // Torso
  if (/blusas|playeras|vestidos|chamarra|sueter|sudadera|camisa|top/i.test(cat)) {
    return 'torso';
  }
  // Piernas
  if (/pantalon|short|falda|jeans|leggins|bermuda/i.test(cat)) {
    return 'piernas';
  }
  // Pies
  if (/calzado|tenis|zapato|bota|sandal|mocasin|zapatilla/i.test(cat)) {
    return 'pies';
  }
  // Fallback por nombre
  const nombre = (p.Nombre || '').toLowerCase();
  if (/camisa|playera|blusa|chamarra|sueter|sudadera|top|hoodie/i.test(nombre)) return 'torso';
  if (/pantalon|short|falda|jeans|leggins|bermuda/i.test(nombre)) return 'piernas';
  if (/tenis|zapato|bota|sandal|mocasin|zapatilla|calzado/i.test(nombre)) return 'pies';
  return null;
}

// ============================================================
//  DETECCIÓN DE GÉNERO
// ============================================================
function detectGenero(p) {
  const genderFromCat = getGenderFromCategory(p.Categoria);
  if (genderFromCat && genderFromCat !== 'UNISEX') {
    return genderFromCat.toLowerCase();
  }
  const hay = _obHay(p);
  if (GENERO_KEYWORDS.hombre.some(k => hay.includes(k))) return 'hombre';
  if (GENERO_KEYWORDS.mujer.some(k => hay.includes(k))) return 'mujer';
  return 'unisex';
}

// ============================================================
//  DETECCIÓN DE VESTIDO
// ============================================================
function detectVestido(p) {
  if (p.Categoria && p.Categoria.toLowerCase().includes('vestido')) return true;
  const esCalzado = p.Categoria && /calzado|tenis|zapato|bota|sandal/i.test(p.Categoria);
  if (esCalzado) return false;
  const hay = _obHay(p);
  return VESTIDO_KEYWORDS.some(k => hay.includes(k));
}

// ============================================================
//  DETECCIÓN DE ESTILO
// ============================================================
function detectEstilo(p, section) {
  const hay = _obHay(p);
  if (section === 'pies') {
    return PIES_FORMAL_KEYWORDS.some(k => hay.includes(k)) ? 'formal' : 'casual';
  }
  return hay.includes(ESTILO_FORMAL_KEYWORD) ? 'formal' : 'casual';
}

// ============================================================
//  FUNCIONES DE FILTRO
// ============================================================
function matchesGenero(g, filtro) { return filtro === 'todos' || g === filtro || g === 'unisex'; }
function matchesEstilo(e, filtro) { return filtro === 'todos' || e === filtro; }
function matchesTalla(p, filtro) {
  if (filtro === 'todos') return true;
  const talla = String((p && (p.Talla ?? p.talla)) ?? '').trim();
  if (!talla) return false;
  return talla.split(/[,\/]/).map(t => t.trim()).includes(filtro);
}

// ============================================================
//  CARGA Y GUARDADO DE FILTROS
// ============================================================
function loadFilters() {
  try {
    const saved = JSON.parse(localStorage.getItem(FILTERS_KEY));
    const merged = Object.assign({ modo: 'conjunto', genero: 'todos', estilo: 'todos' }, saved || {});
    if (!['todos', 'casual', 'formal'].includes(merged.estilo)) merged.estilo = 'todos';
    merged.talla = Object.assign({ torso: 'todos', piernas: 'todos', pies: 'todos' }, (saved && saved.talla) || {});
    return merged;
  } catch (e) { return { modo: 'conjunto', genero: 'todos', estilo: 'todos', talla: { torso: 'todos', piernas: 'todos', pies: 'todos' } }; }
}
function saveFilters() {
  try { localStorage.setItem(FILTERS_KEY, JSON.stringify(filters)); } catch (e) {}
}

// ============================================================
//  RENDERIZADO DE SECCIONES
// ============================================================
function cardThumb(p) {
  const url = (typeof optimizeDriveUrl === 'function')
    ? optimizeDriveUrl(p.Imagen1 || '', 200)
    : (p.Imagen1 || '');
  return url || 'https://placehold.co/200x200/3b1f5f/white?text=Sin+Imagen';
}

function renderEmpty(key, filtersActive) {
  const wrap = document.getElementById('ob-wrap-' + key);
  if (!wrap) return;
  const msg = filtersActive
    ? 'No hay prendas que coincidan con tus filtros en esta categoría.'
    : 'Aún no hay prendas disponibles en esta categoría.';
  wrap.innerHTML = '<div class="ob-empty">' + msg + '</div>';
}

function renderSection(key, items) {
  const wrap = document.getElementById('ob-wrap-' + key);
  if (!wrap) return;
  const filtersActive = filters.genero !== 'todos' || filters.estilo !== 'todos';
  if (!items.length) {
    sectionProducts[key] = [];
    sectionById[key] = new Map();
    outfitState[key] = null;
    renderEmpty(key, filtersActive);
    updateSummary();
    return;
  }

  sectionProducts[key] = items;
  const byId = new Map();
  items.forEach(p => byId.set(String(p.ID), p));
  sectionById[key] = byId;

  const track = document.createElement('div');
  track.className = 'ob-track';
  track.id = 'ob-track-' + key;

  items.forEach((p, idx) => {
    const card = document.createElement('div');
    card.className = 'ob-card' + (idx === 0 ? ' active' : '');
    card.dataset.pid = String(p.ID);
    const name = (typeof escapeHtml === 'function') ? escapeHtml(p.Nombre || 'Producto') : p.Nombre;
    const talla = (typeof escapeHtml === 'function') ? escapeHtml(p.Talla || '') : p.Talla;
    card.innerHTML =
      '<div class="ob-card-img-wrap">' +
        '<img src="' + cardThumb(p) + '" alt="' + name + '" loading="lazy">' +
        '<div class="ob-card-info">' +
          '<div class="ob-card-name">' + name + '</div>' +
          '<div class="ob-card-price">' + (typeof formatCurrency === 'function' ? formatCurrency(p.Precio) : '$' + p.Precio) + '</div>' +
          (talla ? '<div class="ob-card-size">Talla ' + talla + '</div>' : '') +
        '</div>' +
      '</div>';
    track.appendChild(card);
  });

  wrap.innerHTML = '';
  wrap.appendChild(track);

  outfitState[key] = items[0];

  track.addEventListener('click', (e) => {
    const card = e.target.closest('.ob-card');
    if (!card) return;
    const pid = card.dataset.pid;
    const product = sectionById[key].get(pid);
    if (!product) return;

    if (card.classList.contains('active')) {
      const info = card.querySelector('.ob-card-info');
      if (info) info.classList.toggle('show');
      return;
    }

    Array.from(track.children).forEach(c => {
      c.classList.remove('active');
      const i = c.querySelector('.ob-card-info');
      if (i) i.classList.remove('show');
    });
    card.classList.add('active');
    outfitState[key] = product;
    updateSummary();
    card.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  });

  wrap.addEventListener('scroll', () => {
    if (scrollRaf[key]) return;
    scrollRaf[key] = requestAnimationFrame(() => {
      scrollRaf[key] = null;
      updateActiveCard(key, track);
    });
  }, { passive: true });

  updateSummary();
}

function updateActiveCard(key, track) {
  const wrapRect = track.parentElement.getBoundingClientRect();
  const centerX = wrapRect.left + wrapRect.width / 2;
  let closest = null;
  let closestDist = Infinity;
  Array.from(track.children).forEach(card => {
    const r = card.getBoundingClientRect();
    const dist = Math.abs((r.left + r.width / 2) - centerX);
    if (dist < closestDist) { closestDist = dist; closest = card; }
    card.classList.remove('active');
    const info = card.querySelector('.ob-card-info');
    if (info) info.classList.remove('show');
  });
  if (closest) {
    closest.classList.add('active');
    const pid = closest.dataset.pid;
    const product = sectionById[key].get(pid);
    if (product) { outfitState[key] = product; updateSummary(); }
  }
}

// ============================================================
//  ACTUALIZACIÓN DEL RESUMEN
// ============================================================
function activeKeys() {
  return filters.modo === 'vestido' ? ['torso', 'pies'] : ['torso', 'piernas', 'pies'];
}

function renderSlot(key) {
  const slot = document.getElementById('ob-slot-' + key);
  if (!slot) return;
  const product = outfitState[key];
  if (!product) { slot.innerHTML = '—'; return; }
  slot.innerHTML = '<img src="' + cardThumb(product) + '" alt="">';
}

function updateSummary() {
  const piernasSlot = document.getElementById('ob-slot-piernas');
  if (piernasSlot) piernasSlot.style.display = (filters.modo === 'vestido') ? 'none' : '';

  const keys = activeKeys();
  SECTION_KEYS.forEach(renderSlot);
  const total = keys.reduce((sum, k) => {
    const p = outfitState[k];
    return sum + (p ? Number(p.Precio || 0) : 0);
  }, 0);
  const totalEl = document.getElementById('ob-summary-total');
  if (totalEl) totalEl.textContent = (typeof formatCurrency === 'function') ? formatCurrency(total) : '$' + total;
}

// ============================================================
//  APLICAR FILTROS Y RENDERIZAR
// ============================================================
function applyFiltersAndRender() {
  const pools = { torso: [], piernas: [], pies: [], vestido: [] };
  CLASSIFIED.forEach(x => {
    if (!matchesGenero(x.genero, filters.genero)) return;
    if (!matchesEstilo(x.estilo, filters.estilo)) return;
    pools[x.section].push(x.p);
  });

  const piernasSectionEl = document.getElementById('ob-section-piernas');
  const torsoPool = filters.modo === 'vestido' ? pools.vestido : pools.torso;

  populateTallaFilter('torso', torsoPool);
  populateTallaFilter('piernas', pools.piernas);
  populateTallaFilter('pies', pools.pies);

  if (filters.modo === 'vestido') {
    if (piernasSectionEl) piernasSectionEl.hidden = true;
    renderSection('torso', torsoPool.filter(p => matchesTalla(p, filters.talla.torso)));
  } else {
    if (piernasSectionEl) piernasSectionEl.hidden = false;
    renderSection('torso', torsoPool.filter(p => matchesTalla(p, filters.talla.torso)));
    renderSection('piernas', pools.piernas.filter(p => matchesTalla(p, filters.talla.piernas)));
  }
  renderSection('pies', pools.pies.filter(p => matchesTalla(p, filters.talla.pies)));
  updateFiltersBadge();

  const hasItems = Object.values(pools).some(arr => arr.length > 0);
  if (!hasItems && CLASSIFIED.length > 0) {
    if (typeof showTemporaryMessage === 'function') {
      showTemporaryMessage('No hay productos que coincidan con los filtros actuales', 'info');
    }
  } else if (CLASSIFIED.length === 0) {
    if (typeof showTemporaryMessage === 'function') {
      showTemporaryMessage('No se encontraron productos en el catálogo. Revisa tu conexión.', 'error');
    }
  }
}

function updateFiltersBadge() {
  const badge = document.getElementById('ob-filters-badge');
  if (!badge) return;
  let count = 0;
  if (filters.genero !== 'todos') count++;
  if (filters.estilo !== 'todos') count++;
  SECTION_KEYS.forEach(k => { if (filters.talla[k] !== 'todos') count++; });
  badge.textContent = String(count);
  badge.hidden = count === 0;
}

// ============================================================
//  POBLAR FILTRO DE TALLAS
// ============================================================
function populateTallaFilter(key, items) {
  const sel = document.getElementById('ob-select-talla-' + key);
  if (!sel) return;
  const currentVal = filters.talla[key];
  const sizes = new Set();
  items.forEach(p => {
    const talla = String((p && (p.Talla ?? p.talla)) ?? '').trim();
    if (!talla) return;
    talla.split(/[,\/]/).forEach(t => { const clean = t.trim(); if (clean) sizes.add(clean); });
  });
  const order = ['XS', 'S', 'M', 'L', 'XL', 'XXL', 'XXXL'];
  const sorted = [...sizes].sort((a, b) => {
    const ai = order.indexOf(a.toUpperCase()), bi = order.indexOf(b.toUpperCase());
    if (ai !== -1 && bi !== -1) return ai - bi;
    if (ai !== -1) return -1;
    if (bi !== -1) return 1;
    return a.localeCompare(b, 'es', { numeric: true });
  });
  const safeVal = sorted.includes(currentVal) || currentVal === 'todos' ? currentVal : 'todos';
  const esc = typeof escapeHtml === 'function' ? escapeHtml : s => s;
  sel.innerHTML = '<option value="todos">Talla</option>' +
    sorted.map(s => '<option value="' + esc(s) + '"' + (s === safeVal ? ' selected' : '') + '>' + esc(s) + '</option>').join('');
  if (safeVal !== currentVal) { filters.talla[key] = safeVal; saveFilters(); }
}

// ============================================================
//  CONSTRUIR CLASIFICACIÓN DE PRODUCTOS
// ============================================================
function buildSections(products) {
  console.log(`📦 Productos recibidos: ${products.length}`);
  if (!products || products.length === 0) {
    CLASSIFIED = [];
    applyFiltersAndRender();
    return;
  }
  CLASSIFIED = products
    .filter(p => Number(p.Stock ?? p.stock ?? 0) > 0)
    .map(p => {
      const esVestido = detectVestido(p);
      const section = esVestido ? 'vestido' : detectSectionByCategory(p);
      if (!section) {
        console.warn(`⚠️ Producto sin sección: ${p.Nombre} (${p.Categoria})`);
        return null;
      }
      return { p, section, genero: detectGenero(p), estilo: detectEstilo(p, section) };
    })
    .filter(x => x !== null);

  console.log(`✅ Clasificados: ${CLASSIFIED.length} productos`);
  applyFiltersAndRender();
}

// ============================================================
//  INICIALIZACIÓN (CON LIMIT CORREGIDO)
// ============================================================
function init() {
  document.querySelectorAll('.ob-mode-btn').forEach(b => b.classList.toggle('active', b.dataset.modo === filters.modo));
  document.querySelectorAll('#ob-chips-genero .ob-chip').forEach(b => b.classList.toggle('active', b.dataset.genero === filters.genero));
  document.querySelectorAll('#ob-chips-estilo .ob-chip').forEach(b => b.classList.toggle('active', b.dataset.estilo === filters.estilo));

  const wrapTorso = document.getElementById('ob-wrap-torso');
  if (wrapTorso) wrapTorso.innerHTML = '<div class="ob-skeleton-track"><div class="ob-skeleton-card"></div><div class="ob-skeleton-card"></div></div>';
  const wrapPiernas = document.getElementById('ob-wrap-piernas');
  if (wrapPiernas) wrapPiernas.innerHTML = '<div class="ob-skeleton-track"><div class="ob-skeleton-card"></div><div class="ob-skeleton-card"></div></div>';
  const wrapPies = document.getElementById('ob-wrap-pies');
  if (wrapPies) wrapPies.innerHTML = '<div class="ob-skeleton-track"><div class="ob-skeleton-card"></div><div class="ob-skeleton-card"></div></div>';

  if (typeof window.loadProductsUnified === 'function') {
    // 🔥 AQUÍ ESTÁ LA CLAVE: limit: 500 para obtener TODOS los productos
    window.loadProductsUnified({
      limit: 500,        // <--- ¡Este es el cambio importante!
      force: true,       // <--- Opcional: fuerza carga desde red
      onProducts: (products, fromCache) => {
        productosCargados = true;
        console.log(`✅ Productos cargados: ${products.length}`);
        if (fromCache && typeof showTemporaryMessage === 'function') {
          showTemporaryMessage('Cargando desde caché...', 'info');
        }
        buildSections(products);
      },
      onError: (err) => {
        productosCargados = false;
        if (typeof showTemporaryMessage === 'function') {
          showTemporaryMessage('Error al cargar productos: ' + (err.message || 'intenta de nuevo'), 'error');
        }
        SECTION_KEYS.forEach(k => renderEmpty(k, false));
      }
    });
  } else {
    console.warn('loadProductsUnified no disponible');
  }
}

// ============================================================
//  EVENTOS (sin cambios)
// ============================================================

document.querySelectorAll('#ob-chips-genero .ob-chip').forEach(btn => {

document.querySelectorAll('#ob-chips-estilo .ob-chip').forEach(btn => {

function openFiltersDrawer() {
  const drawer = document.getElementById('ob-filters-drawer');
  const overlay = document.getElementById('overlay');
  if (drawer) { drawer.classList.add('open'); drawer.setAttribute('aria-hidden', 'false'); }
  if (overlay) { overlay.classList.add('visible'); overlay.setAttribute('aria-hidden', 'false'); }
}
function closeFiltersDrawer() {
  const drawer = document.getElementById('ob-filters-drawer');
  const overlay = document.getElementById('overlay');
  if (drawer) { drawer.classList.remove('open'); drawer.setAttribute('aria-hidden', 'true'); }
  if (overlay) overlay.classList.remove('visible');
}
window.closeFiltersDrawer = closeFiltersDrawer;

document.getElementById('ob-filters-open-btn')?.addEventListener('click', openFiltersDrawer);
document.getElementById('ob-filters-close-btn')?.addEventListener('click', closeFiltersDrawer);
document.getElementById('ob-filters-clear-btn')?.addEventListener('click', () => {
  filters.genero = 'todos';
  filters.estilo = 'todos';
  filters.talla = { torso: 'todos', piernas: 'todos', pies: 'todos' };
  document.querySelectorAll('#ob-chips-genero .ob-chip').forEach(b => b.classList.toggle('active', b.dataset.genero === 'todos'));
  document.querySelectorAll('#ob-chips-estilo .ob-chip').forEach(b => b.classList.toggle('active', b.dataset.estilo === 'todos'));
  saveFilters();
  applyFiltersAndRender();
});

document.getElementById('ob-add-cart-btn')?.addEventListener('click', () => {
  const chosen = activeKeys().map(k => outfitState[k]).filter(Boolean);
  if (!chosen.length) {
    if (typeof showTemporaryMessage === 'function') showTemporaryMessage('Selecciona al menos una prenda', 'error');
    return;
  }
  chosen.forEach(p => { if (typeof addToCart === 'function') addToCart(p); });
  if (typeof showTemporaryMessage === 'function') showTemporaryMessage('Outfit agregado al carrito', 'success');
});

document.getElementById('ob-share-wa-btn')?.addEventListener('click', () => {
  const chosen = activeKeys().map(k => outfitState[k]).filter(Boolean);
  if (!chosen.length) {
    if (typeof showTemporaryMessage === 'function') showTemporaryMessage('Selecciona al menos una prenda', 'error');
    return;
  }
  const lines = chosen.map(p => '• ' + (p.Nombre || 'Producto') + ' — ' + (typeof formatCurrency === 'function' ? formatCurrency(p.Precio) : '$' + p.Precio));
  const total = chosen.reduce((s, p) => s + Number(p.Precio || 0), 0);
  const msg = 'Hola, armé este outfit en Z&R y me interesa:\n\n' + lines.join('\n') + '\n\nTotal: ' + (typeof formatCurrency === 'function' ? formatCurrency(total) : '$' + total);
  const number = (typeof WHATSAPP_NUMBER !== 'undefined') ? WHATSAPP_NUMBER : '';
  window.open('https://wa.me/' + number + '?text=' + encodeURIComponent(msg), '_blank');
});

document.getElementById('ob-reset-btn')?.addEventListener('click', () => {
  SECTION_KEYS.forEach(key => {
    const wrap = document.getElementById('ob-wrap-' + key);
    if (wrap) wrap.scrollTo({ left: 0, behavior: 'smooth' });
  });
  setTimeout(() => {
    SECTION_KEYS.forEach(key => {
      const items = sectionProducts[key];
      if (items && items.length) outfitState[key] = items[0];
    });
    updateSummary();
  }, 350);
});

//  DOMContentLoaded
// ============================================================

  init();

  if (typeof loadCartFromStorage === 'function') loadCartFromStorage();
  if (typeof renderCart === 'function') renderCart();
  if (typeof updateSavedPhoneDisplay === 'function') updateSavedPhoneDisplay();

  document.getElementById('close-cart-btn')?.addEventListener('click', () => {
    if (typeof window.closeCartDrawer === 'function') window.closeCartDrawer();
  });

  const overlay = document.getElementById('overlay');
  if (overlay) {
    overlay.addEventListener('click', () => {
      if (typeof window.closeCartDrawer === 'function') window.closeCartDrawer();
      if (typeof closeImageModal === 'function') closeImageModal();
      if (typeof window.closeFiltersDrawer === 'function') window.closeFiltersDrawer();
      overlay.classList.remove('visible');
    });
  }

  window.addEventListener('cartUpdated', () => {
    if (typeof renderCart === 'function') renderCart();
    if (typeof updateCartBadge === 'function') updateCartBadge();
  });

  function updateBottomBadges() {
    const cartCount = document.getElementById('bottom-cart-count');
    const wishlistCount = document.getElementById('bottom-wishlist-count');
    if (cartCount) {
      const cart = JSON.parse(localStorage.getItem('cart') || '{}');
      const total = Object.values(cart).reduce((s, i) => s + (i.quantity || 0), 0);
      cartCount.textContent = total;
    }
    if (wishlistCount) {
      const wishlistLooks = JSON.parse(localStorage.getItem('zr_looks_wishlist') || '[]');
      wishlistCount.textContent = wishlistLooks.length;
    }
  }

  document.getElementById('nav-catalogo')?.addEventListener('click', () => { window.location.href = 'catalogo.html'; });
  document.getElementById('nav-outfit')?.addEventListener('click', () => { window.location.href = 'outfit.html'; });
  document.getElementById('nav-comunidad')?.addEventListener('click', () => { window.location.href = 'comunidad.html'; });
  document.getElementById('nav-cart')?.addEventListener('click', (e) => {
    e.preventDefault();
    if (typeof openCartDrawer === 'function') openCartDrawer();
  });
  document.getElementById('nav-wishlist')?.addEventListener('click', (e) => {
    e.preventDefault();
    window.location.href = 'outfit.html';
  });

  window.addEventListener('cartUpdated', updateBottomBadges);
  window.addEventListener('storage', updateBottomBadges);
  updateBottomBadges();
});

})();
