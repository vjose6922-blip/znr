<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — Z&R</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1e2128;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 360px;
      background: #252831;
      border-radius: 24px;
      padding: 40px 28px;
      border: 1px solid rgba(255,255,255,.07);
    }
    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      background: rgba(255,79,129,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ff4f81;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    p  { font-size: 14px; color: #888; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: linear-gradient(135deg, #ff4f81, #ff7a4f);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 28px;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M10.584 10.587a2 2 0 002.828 2.83m3.728-7.197A9 9 0 0121.73 9.5m-2.94 2.94A5.985 5.985 0 0117 12a5.985 5.985 0 00-1.649-.23M12 18.75h.008v.008H12v-.008zM4.27 6.27A9 9 0 002.27 9.5M6.34 12.16A5.985 5.985 0 007 12c.898 0 1.75.195 2.516.544"/>
      </svg>
    </div>
    <h1>Sin conexión</h1>
    <p>No hay internet disponible. Puedes seguir viendo el catálogo guardado mientras recuperas la conexión.</p>
    <button onclick="location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" aria-hidden="true"><use href="#ic-refresh"/></svg>
      Reintentar
    </button>
  </div>
</body>
</html>
