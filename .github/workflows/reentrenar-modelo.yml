name: Reentrenar modelo IA (auto-tag de categoría)

on:
  workflow_dispatch:
    inputs:
      motivo:
        description: "Motivo del reentrenamiento (opcional)"
        required: false
        default: "Disparado desde panel de admin de ZNR"
      min_fotos_categoria:
        description: "Mínimo de fotos por categoría para incluirla (baja esto para pruebas de humo con poco inventario)"
        required: false
        default: "15"

permissions:
  contents: write

jobs:
  entrenar:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt

      - name: Entrenar modelo y exportar model.tflite + labels.txt
        env:
          CATALOGO_CSV_URL: ${{ secrets.CATALOGO_CSV_URL }}
          MIN_FOTOS_POR_CATEGORIA: ${{ github.event.inputs.min_fotos_categoria }}
        run: python scripts/entrenar_modelo.py

      - name: Commit y push del modelo actualizado
        run: |
          git config user.name "znr-ai-bot"
          git config user.email "znr-ai-bot@users.noreply.github.com"
          git add model.tflite labels.txt
          if git diff --cached --quiet; then
            echo "Sin cambios en model.tflite / labels.txt, nada que commitear."
          else
            git commit -m "🤖 Reentrenar modelo IA de auto-tag de categoría"
            git push
          fi
