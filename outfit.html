    </div>
  </aside>

  <aside class="cart-drawer" id="cart-drawer" aria-hidden="true">
    <div class="cart-header">
      <h2>Tu carrito</h2>
      <button class="icon-button" id="close-cart-btn" aria-label="Cerrar carrito">✕</button>
    </div>
    <div class="cart-body" id="cart-items-container"></div>
    <div class="cart-footer">
      <div class="cart-summary-row">
        <span>Subtotal</span>

      </div>
      <div class="cart-summary-row total">
        <span>Total</span>
        <span id="cart-total">$0</span>
      </div>
      <div id="saved-phone-container" style="font-size: 11px; text-align: center; margin: 8px 0; color: #666; display: none;">
        📱 Número guardado: <span id="saved-phone-display"></span>
        <button id="change-phone-btn" style="background: none; border: none; color: #ff4f81; cursor: pointer; text-decoration: underline; margin-left: 5px;">Cambiar</button>
      </div>
      <button id="request-purchase-btn" class="primary-button full-width" style="background: linear-gradient(135deg, #25D366, #128C7E); margin-top: 8px;">
        📝 Solicitar compra
      </button>
    </div>
  </aside>

  <div class="overlay" id="overlay" aria-hidden="true"></div>

  <div class="image-modal" id="image-modal" aria-hidden="true">
    <button class="icon-button close-image-modal" id="close-image-modal">✕</button>

 <script src="common.js" defer></script>
<script src="cache-manager.js" defer></script>
<script src="offline-manager.js" defer></script>
<script src="looks.js" defer></script>

  <script defer>
// ===== VARIABLES GLOBALES =====
let cartInitialized = false;

// ===== FUNCIONES AUXILIARES =====
function updateLooksWishlistBadge() {
    const count = JSON.parse(localStorage.getItem('zr_looks_wishlist') || '[]').length;
    const badge = document.getElementById("wishlist-count-looks");
    if (badge) badge.textContent = count;
}

// ===== DOM CONTENT LOADED =====
document.addEventListener("DOMContentLoaded", () => {
    console.log("🚀 Inicializando página con modales personalizados...");

    // Exponer funciones globales
    window.changePhoneNumber = changePhoneNumber;
    window.updateSavedPhoneDisplay = updateSavedPhoneDisplay;
    window.openCartDrawer = openCartDrawer;
    window.closeCartDrawer = closeCartDrawer;
    window.renderCart = renderCart;
    window.addToCart = addToCart;

    // Botón flotante del carrito
    const floatingCartBtn = document.getElementById("floating-cart-btn");
    if (floatingCartBtn) {
        const newBtn = floatingCartBtn.cloneNode(true);
        floatingCartBtn.parentNode.replaceChild(newBtn, floatingCartBtn);
        newBtn.addEventListener("click", () => {
            console.log("🛒 Abriendo carrito");
            if (typeof window.openCartDrawer === "function") {
                window.openCartDrawer();
            }
        });
    }

    // Botón cerrar carrito
    const closeCartBtn = document.getElementById("close-cart-btn");
    if (closeCartBtn) {
        const newBtn = closeCartBtn.cloneNode(true);
        closeCartBtn.parentNode.replaceChild(newBtn, closeCartBtn);
        newBtn.addEventListener("click", () => {
            console.log("❌ Cerrando carrito");
            if (typeof window.closeCartDrawer === "function") {
                window.closeCartDrawer();
            }
        });
    }

    // Overlay (cierra todo)
    const overlay = document.getElementById("overlay");
    if (overlay) {
        const newOverlay = overlay.cloneNode(true);
        overlay.parentNode.replaceChild(newOverlay, overlay);
        newOverlay.addEventListener("click", () => {
            if (typeof window.closeCartDrawer === "function") {
                window.closeCartDrawer();
            }
            if (typeof window.closeWishlistDrawer === "function") {
                window.closeWishlistDrawer();
            }
            const looksDrawer = document.getElementById("wishlist-looks-drawer");
            if (looksDrawer) looksDrawer.classList.remove("open");
            if (typeof closeImageModal === "function") {
                closeImageModal();
            }
            newOverlay.classList.remove("visible");
        });
    }

    // Inicializar carrito (solo una vez)
    if (!cartInitialized) {
        if (typeof loadCartFromStorage === "function") loadCartFromStorage();
        if (typeof renderCart === "function") renderCart();
        if (typeof updateSavedPhoneDisplay === "function") updateSavedPhoneDisplay();
        cartInitialized = true;
    }

    // Inicializar badge de wishlist de looks
    updateLooksWishlistBadge();
});

// ===== EVENTO CART UPDATED =====
window.addEventListener("cartUpdated", () => {
    if (typeof renderCart === "function") renderCart();
    if (typeof updateCartBadge === "function") updateCartBadge();
});

// ===== WISHLIST DE LOOKS - BOTÓN FLOTANTE =====
const floatingWishlistLooksBtn = document.getElementById("floating-wishlist-looks-btn");
if (floatingWishlistLooksBtn) {
    floatingWishlistLooksBtn.addEventListener("click", () => {
        const drawer = document.getElementById("wishlist-looks-drawer");
        const overlay = document.getElementById("overlay");
        if (drawer) drawer.classList.add("open");
        if (overlay) overlay.classList.add("visible");
        if (typeof renderWishlistLooks === 'function') renderWishlistLooks();
    });
}

// ===== WISHLIST DE LOOKS - CERRAR =====
const closeWishlistLooksBtn = document.getElementById("close-wishlist-looks-btn");
if (closeWishlistLooksBtn) {
    closeWishlistLooksBtn.addEventListener("click", () => {
        const drawer = document.getElementById("wishlist-looks-drawer");
        const overlay = document.getElementById("overlay");
        if (drawer) drawer.classList.remove("open");
        if (overlay) overlay.classList.remove("visible");
    });
}

// ===== WISHLIST DE LOOKS - AGREGAR TODO AL CARRITO =====
const addAllLooksToCartBtn = document.getElementById("add-all-looks-to-cart");
if (addAllLooksToCartBtn) {
    addAllLooksToCartBtn.addEventListener("click", () => {
        const wishlistIds = JSON.parse(localStorage.getItem('zr_looks_wishlist') || '[]');
        wishlistIds.forEach(lookId => {
            if (typeof addLookToCart === 'function') addLookToCart(lookId);
        });
        if (typeof showTemporaryMessage === 'function') {
            showTemporaryMessage("✅ Todos los looks agregados al carrito", "success");
        }
    });
}

// ===== ACTUALIZAR BADGE POR EVENTO STORAGE =====
window.addEventListener('storage', (e) => {
    if (e.key === 'zr_looks_wishlist') updateLooksWishlistBadge();
});

// ===== BOTTOM NAVIGATION =====
document.addEventListener('DOMContentLoaded', function() {
    const bottomNav = document.querySelector('.bottom-nav');
    if (!bottomNav) return;
    
    // Actualizar contadores (badges)
    function updateBottomBadges() {
        const cartCount = document.getElementById('bottom-cart-count');
        const wishlistCount = document.getElementById('bottom-wishlist-count');
        
        if (cartCount) {
            const cart = JSON.parse(localStorage.getItem('cart') || '{}');
            const total = Object.values(cart).reduce((s, i) => s + (i.quantity || 0), 0);
            cartCount.textContent = total;
        }
        
        if (wishlistCount) {
            const wishlistLooks = JSON.parse(localStorage.getItem('zr_looks_wishlist') || '[]');
            wishlistCount.textContent = wishlistLooks.length;
        }
    }
    
    // Navegación
    const navCatalogo = document.getElementById('nav-catalogo');
    const navOutfit = document.getElementById('nav-outfit');
    const navCart = document.getElementById('nav-cart');
    const navWishlist = document.getElementById('nav-wishlist');
    
    if (navCatalogo) {
        navCatalogo.addEventListener('click', () => {
            window.location.href = 'catalogo.html';
        });
    }
    
    if (navOutfit) {
        navOutfit.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
    }
    
    if (navCart && typeof openCartDrawer === 'function') {
        navCart.addEventListener('click', (e) => {
            e.preventDefault();
            openCartDrawer();
        });
    }
    
    // Wishlist de LOOKS desde la barra inferior
    if (navWishlist) {
        navWishlist.addEventListener('click', (e) => {
            e.preventDefault();
            const drawer = document.getElementById('wishlist-looks-drawer');
            const overlay = document.getElementById('overlay');
            if (drawer) drawer.classList.add('open');
            if (overlay) overlay.classList.add('visible');
            if (typeof renderWishlistLooks === 'function') renderWishlistLooks();
        });
    }
    
    // Escuchar eventos para actualizar badges
    window.addEventListener('cartUpdated', updateBottomBadges);
    window.addEventListener('storage', updateBottomBadges);
    
    // Inicializar badges
    updateBottomBadges();
});


    
  </script>
